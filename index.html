<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記者原稿ツール</title>
<script>
(function(){
  var PASS_KEY="reporter_auth_v1",CORRECT="press2025";
  if(sessionStorage.getItem(PASS_KEY)==="ok")return;
  document.documentElement.style.visibility="hidden";
  var e=prompt("パスワードを入力してください:");
  if(e===CORRECT){sessionStorage.setItem(PASS_KEY,"ok");document.documentElement.style.visibility="";}
  else{document.documentElement.style.visibility="";document.open();document.write('<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,sans-serif;color:#888;font-size:14px">アクセスが拒否されました</div>');document.close();}
})();
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#eeede8;
  --tx:#1a1a1a;--tx2:#666;--tx3:#aaa;
  --bd:rgba(0,0,0,0.08);--bd2:rgba(0,0,0,0.15);--bd3:rgba(0,0,0,0.28);
  --green:#1D9E75;--gbg:#E1F5EE;--gtx:#085041;
  --blue:#185FA5;--bbg:#E6F1FB;--btx:#0C447C;
  --abg:#FAEEDA;--atx:#633806;--pbg:#EEEDFE;--ptx:#3C3489;
  --r:8px;--rl:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --sidebar:200px;--sources:380px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1e1e1e;--bg2:#262626;--bg3:#2a2a2a;--tx:#e8e8e8;--tx2:#aaa;--tx3:#555;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);--bd3:rgba(255,255,255,0.25)}
}
html,body{height:100%;font-family:var(--font);background:var(--bg3);color:var(--tx);overflow:hidden}
.shell{display:flex;height:100vh;flex-direction:column}
.topbar{height:44px;background:var(--bg);border-bottom:0.5px solid var(--bd);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.topbar-title{font-size:13px;font-weight:600;color:var(--tx2);margin-right:4px}
.topbar-sep{width:0.5px;height:18px;background:var(--bd2);flex-shrink:0}
.tbtn{padding:5px 11px;border-radius:var(--r);border:0.5px solid var(--bd2);background:transparent;cursor:pointer;font-size:12px;color:var(--tx2);font-family:var(--font);display:flex;align-items:center;gap:4px;white-space:nowrap}
.tbtn:hover{background:var(--bg2);color:var(--tx)}
.tbtn.primary{background:var(--green);color:#fff;border-color:var(--green)}
.tbtn.primary:hover{opacity:0.88}
.tbtn.active{background:var(--bbg);color:var(--btx);border-color:#B5D4F4}
.save-status{font-size:11px;color:var(--green);min-width:56px;font-weight:500}
.workspace{display:flex;flex:1;overflow:hidden}
/* sidebar */
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:0.5px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;min-height:0}
.sidebar-head{padding:10px 12px 6px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sidebar-head span{font-size:11px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:0.05em}
.new-art-btn{font-size:11px;padding:2px 8px;border-radius:var(--r);border:0.5px solid var(--bd2);background:transparent;cursor:pointer;color:var(--tx2);font-family:var(--font);display:flex;align-items:center;gap:3px}
.new-art-btn:hover{background:var(--green);color:#fff;border-color:var(--green)}
.art-list{overflow-y:auto;padding:6px}
.art-item{padding:7px 9px;border-radius:var(--r);cursor:pointer;margin-bottom:2px;border:0.5px solid transparent;position:relative}
.art-item:hover{background:var(--bg);border-color:var(--bd)}
.art-item.active{background:var(--bg);border-color:var(--green);border-width:1.5px}
.art-item-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:16px}
.art-item.active .art-item-title{color:var(--green)}
.art-item-meta{font-size:10px;color:var(--tx3);margin-top:1px}
.art-item-del{position:absolute;top:6px;right:6px;background:transparent;border:none;cursor:pointer;color:var(--tx3);padding:1px;display:none;font-size:12px}
.art-item:hover .art-item-del{display:block}
.art-item-del:hover{color:#E24B4A}
.art-move-btn{background:transparent;border:none;cursor:pointer;color:var(--tx3);padding:1px 2px;display:flex;align-items:center;border-radius:3px}
.art-move-btn:hover{background:var(--bd);color:var(--tx)}
.art-item.drag-over{border-color:var(--green);border-style:dashed;background:var(--gbg)}
.art-item[draggable]{cursor:default}
.status-badge{font-size:9px;padding:1px 6px;border-radius:99px;cursor:pointer;font-weight:600;flex-shrink:0;white-space:nowrap}
.status-writing{background:var(--bbg);color:var(--btx)}
.status-review{background:var(--abg);color:var(--atx)}
.status-done{background:var(--gbg);color:var(--gtx)}
.status-hold{background:var(--bg3);color:var(--tx3);border:0.5px solid var(--bd2)}
.art-filter-btn{font-size:10px;padding:2px 7px;border-radius:99px;border:0.5px solid var(--bd2);background:transparent;cursor:pointer;color:var(--tx2);font-family:var(--font);display:flex;align-items:center}
.art-filter-btn:hover{background:var(--bg);color:var(--tx)}
.art-filter-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
.art-filter-btn#af-writing.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.art-filter-btn#af-review.active{background:#E07B00;color:#fff;border-color:#E07B00}
.art-filter-btn#af-done.active{background:var(--green);color:#fff;border-color:var(--green)}
.art-filter-btn#af-hold.active{background:#888;color:#fff;border-color:#888}
/* editor */
.editor-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.editor-wrap{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:row}



.line-gutter{width:36px;flex-shrink:0;overflow:hidden;position:relative;background:var(--bg)}
.line-num{position:absolute;right:6px;font-size:10px;font-weight:600;color:var(--green);font-family:var(--font);line-height:1}
.editor-inner{flex:1;overflow:auto;padding:36px 32px}
.headline-box{padding:14px 32px 0 32px;flex-shrink:0;border-bottom:0.5px solid var(--bd);background:var(--bg);width:100%}
.headline-input{width:100%;font-size:20px;font-weight:700;font-family:Georgia,serif;border:none;outline:none;background:transparent;color:var(--tx);padding:0 0 12px 0;display:block;box-sizing:border-box}
.headline-input::placeholder{color:var(--tx3);font-weight:400;font-size:16px}
.headline-count.warn{color:var(--atx);font-weight:600}
.editor-textarea{width:100%;height:100%;min-height:400px;border:none;outline:none;resize:none;font-size:15px;line-height:2;color:var(--tx);background:transparent;font-family:'Georgia',serif;caret-color:var(--green);padding:0}
.editor-textarea::placeholder{color:var(--tx3);font-family:var(--font);font-size:14px}
.editor-footer{padding:5px 32px;border-top:0.5px solid var(--bd);font-size:11px;color:var(--tx3);display:flex;gap:12px;align-items:center;flex-shrink:0;background:var(--bg)}
/* source pane */
.source-pane{width:var(--sources);border-left:0.5px solid var(--bd);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0;overflow:hidden}
.source-head{padding:9px 14px 7px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.source-head-title{font-size:12px;font-weight:500;color:var(--tx2)}
.source-add-btn{font-size:11px;padding:3px 9px;border-radius:var(--r);border:0.5px solid var(--bd2);background:var(--bg);cursor:pointer;color:var(--tx2);display:flex;align-items:center;gap:4px;font-family:var(--font)}
.source-add-btn:hover{background:var(--green);color:#fff;border-color:var(--green)}
.source-body{flex:1;overflow-y:auto;padding:10px 12px}
.source-empty{text-align:center;padding:40px 16px;color:var(--tx3);font-size:12px;line-height:1.9}
/* stock pane */
.stock-pane{width:320px;border-left:0.5px solid var(--bd);display:none;flex-direction:column;background:var(--bg2);flex-shrink:0;overflow:hidden}
.stock-pane.open{display:flex}
/* source cards */
.sc{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;transition:border-color 0.12s,box-shadow 0.12s}
.sc:hover{border-color:var(--bd2)}
.sc.highlighted{border:2.5px solid var(--green);box-shadow:0 0 0 3px rgba(29,158,117,0.15);background:#fafffd}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px}
.stag{font-size:10px;padding:2px 7px;border-radius:var(--r);font-weight:500;display:inline-block}
.t-sns{background:var(--bbg);color:var(--btx)}.t-un{background:var(--gbg);color:var(--gtx)}
.t-research{background:var(--abg);color:var(--atx)}.t-media{background:var(--pbg);color:var(--ptx)}
.t-interview{background:#F0EDF8;color:#4A3880}.t-other{background:var(--bg2);color:var(--tx2)}
.sc-note{font-size:11px;color:var(--tx2);margin-left:4px}
.sc-para-badge{font-size:10px;padding:2px 7px;border-radius:var(--r);font-weight:500;margin-left:4px;cursor:pointer;display:inline-flex;align-items:center;gap:3px}
.sc-para-badge.linked{background:var(--gbg);color:var(--gtx);border:1px solid #9FE1CB}
.sc-para-badge.unlinked{background:var(--bg2);color:var(--tx3);border:0.5px dashed var(--bd2)}
.sc-para-badge:hover{opacity:0.72}
.sc-quote{font-size:12px;font-style:italic;border-left:2.5px solid var(--bd2);padding-left:8px;margin:6px 0;line-height:1.55;color:var(--tx)}
.sc.highlighted .sc-quote{border-left-color:var(--green)}
.sc-trans{font-size:11px;color:var(--tx2);line-height:1.5;margin:3px 0}
.sc-url{font-size:10px;color:var(--tx3);word-break:break-all;margin-top:3px}
.sc-url a{color:var(--blue);text-decoration:none}
.sc-url a:hover{text-decoration:underline}
.sc-actions{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.sbtn{font-size:11px;padding:3px 8px;border:0.5px solid var(--bd);border-radius:var(--r);background:transparent;cursor:pointer;color:var(--tx2);display:flex;align-items:center;gap:3px;font-family:var(--font)}
.sbtn:hover{background:var(--bg2);color:var(--tx)}
.sbtn.del:hover{color:#E24B4A;border-color:#F7C1C1;background:#FCEBEB}
.sc-verify-result{font-size:11px;margin-top:6px;padding:6px 8px;background:var(--bg2);border-radius:var(--r);line-height:1.5}
.spinner{display:inline-block;width:10px;height:10px;border:2px solid var(--bd2);border-top-color:var(--tx2);border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pending-banner{background:var(--gbg);border:0.5px solid #9FE1CB;border-radius:var(--r);padding:9px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.pending-banner p{font-size:12px;color:var(--gtx)}
.pending-banner button{font-size:11px;padding:3px 10px;background:var(--green);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-family:var(--font)}
/* para picker */
.para-picker{position:fixed;z-index:300;background:var(--bg);border:0.5px solid var(--bd2);border-radius:var(--r);box-shadow:0 4px 20px rgba(0,0,0,0.14);width:260px;max-height:300px;overflow-y:auto}
.para-picker-head{padding:8px 12px;border-bottom:0.5px solid var(--bd);font-size:11px;font-weight:500;color:var(--tx2);background:var(--bg2)}
.para-picker-item{padding:8px 12px;cursor:pointer;font-size:12px;color:var(--tx);line-height:1.4;border-bottom:0.5px solid var(--bd)}
.para-picker-item:hover{background:var(--gbg);color:var(--gtx)}
.para-picker-item.active{background:var(--gbg);color:var(--gtx)}
.para-picker-item .pnum{font-size:10px;font-weight:600;color:var(--tx3);margin-bottom:2px}
.para-picker-unlink{padding:8px 12px;cursor:pointer;font-size:12px;color:var(--tx3);display:flex;align-items:center;gap:5px;border-top:0.5px solid var(--bd)}
.para-picker-unlink:hover{background:var(--bg2);color:var(--tx)}
/* modals */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.32);z-index:200;display:flex;align-items:center;justify-content:center}
.modal-bg.hidden{display:none}
.modal{background:var(--bg);border-radius:var(--rl);padding:24px;width:560px;max-width:94vw;max-height:88vh;overflow-y:auto;border:0.5px solid var(--bd2)}
.modal h2{font-size:15px;font-weight:500;margin-bottom:16px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.mbtn{padding:7px 16px;border-radius:var(--r);border:0.5px solid var(--bd2);background:transparent;cursor:pointer;font-size:13px;font-family:var(--font);color:var(--tx)}
.mbtn:hover{background:var(--bg2)}
.mbtn.primary{background:var(--green);color:#fff;border-color:var(--green)}
.mbtn.primary:hover{opacity:0.88}
.fl{margin-bottom:10px}
.flabel{font-size:10px;color:var(--tx2);font-weight:500;text-transform:uppercase;letter-spacing:0.04em;display:block;margin-bottom:3px}
.fi{width:100%;padding:7px 10px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);font-size:13px;outline:none;font-family:var(--font)}
.fi:focus{border-color:var(--bd3)}
textarea.fi{resize:vertical;min-height:56px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ali{padding:9px 12px;border-radius:var(--r);cursor:pointer;border:0.5px solid transparent;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.ali:hover{background:var(--bg2);border-color:var(--bd)}
.ali.active{background:var(--gbg);border-color:#9FE1CB}
.ali-title{font-size:13px;font-weight:500}
.ali-meta{font-size:11px;color:var(--tx3);margin-top:1px}
/* src tabs */
.src-tab{padding:7px 14px;border:none;background:transparent;cursor:pointer;font-size:12px;color:var(--tx2);font-family:var(--font);border-bottom:2px solid transparent;margin-bottom:-0.5px;display:flex;align-items:center;gap:5px}
.src-tab:hover{color:var(--tx)}
.src-tab.active{color:var(--green);border-bottom-color:var(--green);font-weight:500}
/* stock */
.stock-tag-btn{font-size:10px;padding:2px 8px;border-radius:99px;border:0.5px solid var(--bd2);background:transparent;cursor:pointer;color:var(--tx2);font-family:var(--font)}
.stock-tag-btn:hover,.stock-tag-btn.active{background:var(--bbg);color:var(--btx);border-color:#B5D4F4}
.src-tag-chip{font-size:10px;padding:1px 7px;border-radius:99px;background:var(--pbg);color:var(--ptx);display:inline-flex;align-items:center;gap:3px}
.src-tag-filter-btn{font-size:10px;padding:2px 8px;border-radius:99px;border:0.5px solid var(--bd2);background:transparent;cursor:pointer;color:var(--tx2);font-family:var(--font)}
.src-tag-filter-btn:hover{background:var(--pbg);color:var(--ptx)}
.src-tag-filter-btn.active{background:var(--ptx);color:#fff;border-color:var(--ptx)}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar" id="topbar">
    <span class="topbar-title">記者原稿</span>
    <div class="topbar-sep"></div>
    <button class="tbtn primary" onclick="saveArticle()"><i class="ti ti-device-floppy"></i> 保存</button>
    <span class="save-status" id="saveStatus"></span>
    <div id="readonlyLabel" style="display:none;align-items:center;gap:6px;padding:4px 12px;background:var(--bbg);border-radius:var(--r);border:0.5px solid #B5D4F4;font-size:12px;font-weight:500;color:var(--btx)">
      <i class="ti ti-eye" style="font-size:13px"></i> 閲覧モード（編集は25字以上に）
    </div>
    <div style="flex:1"></div>
    <button class="tbtn" onclick="openAddSourceModal(null)"><i class="ti ti-plus"></i> 引用元を追加</button>
    <button class="tbtn" id="stockBtn" onclick="toggleStockPane()"><i class="ti ti-bookmarks"></i> ストック<span id="stockCount" style="margin-left:4px;background:var(--bbg);color:var(--btx);font-size:10px;padding:1px 6px;border-radius:99px;font-weight:600;display:none"></span></button>
    <button class="tbtn" onclick="exportData()" title="データをJSONファイルとして保存"><i class="ti ti-download"></i> バックアップ</button>
    <label class="tbtn" title="JSONファイルからデータを復元" style="cursor:pointer"><i class="ti ti-upload"></i> 復元<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
    <button class="tbtn" onclick="copyAllForVerify()"><i class="ti ti-clipboard-copy"></i> 検証用コピー</button>
  </div>
  <div class="workspace">
    <!-- sidebar -->
    <div class="sidebar">
      <div class="sidebar-head">
        <span id="sidebarLabel">案件</span>
        <div style="display:flex;gap:4px">
          <button class="new-art-btn" id="trashBtn" onclick="toggleTrash()" title="ゴミ箱"><i class="ti ti-trash"></i></button>
          <button class="new-art-btn" id="newArtBtn" onclick="newArticle()"><i class="ti ti-plus"></i>新規</button>
        </div>
      </div>
      <div id="artFilterBar" style="display:flex;flex-wrap:wrap;gap:3px;padding:5px 8px;border-bottom:0.5px solid var(--bd);flex-shrink:0">
        <div class="art-filter-btn active" id="af-all" onclick="setArtFilter('all')">全て</div>
        <div class="art-filter-btn" id="af-writing" onclick="setArtFilter('writing')">作業中</div>
        <div class="art-filter-btn" id="af-review" onclick="setArtFilter('review')">確認中</div>
        <div class="art-filter-btn" id="af-done" onclick="setArtFilter('done')">済み</div>
        <div class="art-filter-btn" id="af-hold" onclick="setArtFilter('hold')">保留</div>
      </div>
      <div style="flex:1;overflow-y:auto;min-height:0"><div class="art-list" id="artList"></div></div>
    </div>
    <!-- editor -->
    <div class="editor-pane">
      <div class="headline-box">
        <input type="text" id="headlineInput" class="headline-input" placeholder="見出しを入力...（案件名にもなります）" oninput="onHeadlineInput(this.value)">
      </div>
      <div class="editor-wrap" id="editorWrap">
        <div class="line-gutter" id="lineGutter"></div>
        <div class="editor-inner" id="editorInner">
          <textarea class="editor-textarea" id="editor" placeholder="原稿をここに入力..."></textarea>
          <div id="paraHighlight"></div>
        </div>
        <div id="colEditor" style="display:none;width:100%;height:100%;position:absolute;top:0;left:0;overflow:auto;padding:36px 32px;gap:32px;align-items:flex-start"></div>
      </div>
      <div class="editor-footer">
        <i class="ti ti-columns" style="font-size:13px;color:var(--tx3)"></i>
        <input type="range" id="colSlider" min="11" max="40" value="40" step="1" style="width:120px" oninput="updateColWidth(parseInt(this.value))">
        <span id="colWidthLabel" style="font-size:11px;color:var(--tx2);min-width:32px">40字</span>
        <div style="flex:1"></div>
        <span id="charCount" style="font-size:15px;font-weight:600">0 文字</span>
        <span id="lineCount" style="font-size:15px;font-weight:600">0 行</span>
        <span id="paraCount" style="font-size:15px;font-weight:600">0 段落</span>
        <span id="activeParaInfo" style="font-size:11px;color:var(--green);font-weight:500"></span>
      </div>
    </div>
    <!-- stock pane -->
    <div class="stock-pane" id="stockPane">
      <div style="padding:9px 14px 0;border-bottom:0.5px solid var(--bd);flex-shrink:0">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:12px;font-weight:500;color:var(--tx2)">ストック・引用元一覧</span>
          <button class="sbtn" onclick="toggleStockPane()"><i class="ti ti-x" style="font-size:12px"></i></button>
        </div>
        <div style="display:flex;gap:0;border-bottom:0.5px solid var(--bd2)">
          <div id="stab-all" class="src-tab active" onclick="switchStockTab('all')"><i class="ti ti-database" style="font-size:12px"></i> 全て</div>
          <div id="stab-unused" class="src-tab" onclick="switchStockTab('unused')"><i class="ti ti-bookmark" style="font-size:12px"></i> 未使用</div>
        </div>
      </div>
      <div style="padding:6px 10px;border-bottom:0.5px solid var(--bd);flex-shrink:0;display:flex;gap:4px;flex-wrap:wrap;align-items:center">
        <span style="font-size:10px;color:var(--tx3)">タグ:</span>
        <div id="stockTagBar" style="display:flex;gap:3px;flex-wrap:wrap;flex:1"></div>
        <button class="source-add-btn" onclick="openAddStockModal()"><i class="ti ti-plus" style="font-size:11px"></i>追加</button>
      </div>
      <div id="stockBody" style="flex:1;overflow-y:auto;padding:10px 12px"></div>
    </div>
    <!-- source pane -->
    <div class="source-pane">

        <span style="font-size:10px;color:var(--tx3);flex-shrink:0">タグ絞込:</span>
        <div id="srcTagFilters" style="display:flex;gap:3px;flex-wrap:wrap;flex:1"></div>
        <button class="sbtn" onclick="clearSrcTagFilter()" id="clearTagBtn" style="display:none;font-size:10px">✕ 解除</button>
      </div>
      <div class="source-body" id="sourceBody"></div>
    </div>

</div>

      <div class="fl">
        <label class="flabel">タグ（カンマ区切り）</label>
        <input class="fi" id="iTags" placeholder="例: ネタニヤフ, ガザ" oninput="showSrcTagSuggestions()">

<div class="modal-bg hidden" id="addStockModal">
  <div class="modal" style="width:500px">
    <h2><i class="ti ti-bookmarks"></i> ストックに保存</h2>
    <div class="fl"><label class="flabel">URL</label><input class="fi" id="sUrl" placeholder="https://..."></div>
    <div class="fl"><label class="flabel">引用テキスト</label><textarea class="fi" id="sQuote" placeholder="気になった部分をペースト"></textarea></div>
    <div class="fl"><label class="flabel">メモ・タイトル</label><input class="fi" id="sNote" placeholder="何についての記事か、一言メモ"></div>

      <label class="flabel">テーマタグ（カンマ区切り）</label>
      <input class="fi" id="sTags" placeholder="例: イスラエル, 停戦交渉" oninput="showTagSuggestions()">
      <div id="existingTagsHint" style="margin-top:5px"></div>
    </div>

      <button class="mbtn" onclick="closeModal('addStockModal')">キャンセル</button>
      <button class="mbtn primary" onclick="saveStock()"><i class="ti ti-check"></i> 保存</button>
    </div>
  </div>

<script>
const SK='reporter_v4'; // Keep v4 to preserve existing data
let state={articles:[],stocks:[],currentId:null};
let activePara=null,currentColWidth=40,pickerSourceId=null;
let showingTrash=false,stockPaneVisible=false,stockTab='all',stockTagFilter=null,artFilter='all';

// ── persistence ──
function exportData(){
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'reporter_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try{
      const imported = JSON.parse(ev.target.result);
      if(!imported.articles) throw new Error('無効なファイルです');
      if(!confirm(`${imported.articles.length}件の案件を復元しますか？\n現在のデータは上書きされます。`)) return;
      state = imported;
      if(!state.stocks) state.stocks = [];
      save(true);
      renderArtList();
      renderEditor();
      renderSources();
      updateStockCount();
      alert('復元しました');
    }catch(err){
      alert('読み込みに失敗しました: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function load(){
  try{const d=localStorage.getItem(SK);if(d)state=JSON.parse(d);}catch(e){}
  // Also try older keys to recover data
  if(!state.articles.length){
    ['reporter_v5','reporter_v3','reporter_v2'].forEach(k=>{
      if(state.articles.length)return;
      try{const d=localStorage.getItem(k);if(d){const s=JSON.parse(d);if(s.articles&&s.articles.length){state.articles=s.articles;state.stocks=s.stocks||[];}}}catch(e){}
    });
  }
  if(!state.stocks)state.stocks=[];
  if(!state.articles.length)newArticle(true);
  else{renderArtList();renderEditor();renderSources();}
  checkPending();updateStockCount();
}
function save(silent){
  const art=getCurrentArticle();if(art)art.text=document.getElementById('editor').value;
  try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}
  if(!silent){const el=document.getElementById('saveStatus');el.textContent='保存済み ✓';setTimeout(()=>el.textContent='',2200);}
}
function autoSave(){
  const art=getCurrentArticle();if(art){art.text=document.getElementById('editor').value;updateFooter();}
  try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}
}
function saveArticle(){save(false);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function tagClass(t){return({'SNS/X':'t-sns','国連・公式':'t-un','研究機関':'t-research','メディア':'t-media','独自取材':'t-interview','その他':'t-other'}[t]||'t-other');}
function getCurrentArticle(){return state.articles.find(a=>a.id===state.currentId)||null;}
function getParas(text){const r=[];(text||'').split('\n').forEach((l,i)=>{if(l.trim())r.push({num:r.length+1,text:l.trim(),lineIdx:i});});return r;}

// ── articles ──
const STATUS_LIST=['writing','review','done','hold'];
const STATUS_LABELS={writing:'作業中',review:'確認中',done:'済み',hold:'保留'};
function statusLabel(s){return STATUS_LABELS[s]||'作業中';}
function cycleStatus(id,e){
  e.stopPropagation();
  const art=state.articles.find(a=>a.id===id);if(!art)return;
  const i=STATUS_LIST.indexOf(art.status||'writing');
  art.status=STATUS_LIST[(i+1)%STATUS_LIST.length];
  save(true);renderArtList();
}
function newArticle(silent){
  if(showingTrash)return;
  const a={id:uid(),title:'新規案件 '+(state.articles.filter(a=>!a.deleted).length+1),createdAt:new Date().toLocaleDateString('ja'),text:'',sources:[],status:'writing'};
  state.articles.unshift(a);state.currentId=a.id;activePara=null;
  save(true);renderArtList();renderEditor();renderSources();
}
function selectArticle(id){
  if(showingTrash)return;
  if(state.currentId===id)return;
  save(true);state.currentId=id;activePara=null;
  renderArtList();renderEditor();renderSources();
}
function deleteArticle(id,e){
  e.stopPropagation();
  if(!confirm('ゴミ箱に移動しますか？'))return;
  const art=state.articles.find(a=>a.id===id);
  if(art){art.deleted=true;art.deletedAt=new Date().toLocaleString('ja');}
  if(state.currentId===id){const next=state.articles.find(a=>!a.deleted);state.currentId=next?.id||null;}
  save(true);renderArtList();renderEditor();renderSources();
}
function restoreArticle(id,e){e.stopPropagation();const art=state.articles.find(a=>a.id===id);if(art){art.deleted=false;art.deletedAt=null;}save(true);renderArtList();}
function permanentDelete(id,e){
  e.stopPropagation();
  if(!confirm('完全に削除します。元に戻せません。'))return;
  state.articles=state.articles.filter(a=>a.id!==id);save(true);renderArtList();
}
function toggleTrash(){
  showingTrash=!showingTrash;
  const btn=document.getElementById('trashBtn'),label=document.getElementById('sidebarLabel'),newBtn=document.getElementById('newArtBtn');
  const filterBar=document.getElementById('artFilterBar');
  if(showingTrash){
    btn.style.cssText='background:var(--abg);color:var(--atx);border-color:#FAC775';
    label.textContent='ゴミ箱';newBtn.style.display='none';
    if(filterBar)filterBar.style.display='none';
  }else{
    btn.style.cssText='';label.textContent='案件';newBtn.style.display='';
    if(filterBar)filterBar.style.display='';
  }
  renderArtList();
}
function startRename(id,e){
  e.stopPropagation();
  const art=state.articles.find(a=>a.id===id);if(!art)return;
  const el=document.getElementById('at_'+id);if(!el)return;
  el.contentEditable='true';el.focus();
  const range=document.createRange();range.selectNodeContents(el);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  el.onblur=()=>{art.title=el.innerText.trim()||art.title;el.contentEditable='false';save(true);renderArtList();};
  el.onkeydown=e2=>{if(e2.key==='Enter'){e2.preventDefault();el.blur();}};
}
function updateFilterCounts(){
  const active=state.articles.filter(a=>!a.deleted);
  const counts={
    all:active.length,
    active:active.filter(a=>!a.status||a.status==='writing'||a.status==='review').length,
    writing:active.filter(a=>(a.status||'writing')==='writing').length,
    review:active.filter(a=>a.status==='review').length,
    done:active.filter(a=>a.status==='done').length,
    hold:active.filter(a=>a.status==='hold').length
  };
  Object.entries(counts).forEach(([k,v])=>{
    const btn=document.getElementById('af-'+k);
    if(!btn)return;
    // Update or add count badge
    let badge=btn.querySelector('.filter-count');
    if(!badge){badge=document.createElement('span');badge.className='filter-count';badge.style.cssText='margin-left:3px;font-size:9px;opacity:0.7';btn.appendChild(badge);}
    badge.textContent=v?`(${v})`:'';
  });
}

function setArtFilter(f){
  artFilter=f;
  // Hide filter bar when in trash mode
  document.querySelectorAll('.art-filter-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('af-'+f);if(btn)btn.classList.add('active');
  renderArtList();
}

let dragSrcId = null;

function artDragStart(e, id){
  dragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '0.5';
}
function artDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function artDrop(e, targetId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragSrcId || dragSrcId === targetId) return;
  const activeList = state.articles.filter(a=>!a.deleted);
  const allList = state.articles;
  const srcIdx = allList.findIndex(a=>a.id===dragSrcId);
  const tgtIdx = allList.findIndex(a=>a.id===targetId);
  if(srcIdx<0||tgtIdx<0) return;
  const [moved] = allList.splice(srcIdx,1);
  allList.splice(tgtIdx,0,moved);
  save(true); renderArtList();
}
function artDragEnd(e){
  e.currentTarget.style.opacity = '';
  document.querySelectorAll('.art-item').forEach(el=>el.classList.remove('drag-over'));
  dragSrcId = null;
}

function moveArt(id, dir, e){
  e.stopPropagation();
  const list = state.articles.filter(a=>!a.deleted);
  const allList = state.articles;
  const visIdx = list.findIndex(a=>a.id===id);
  if(visIdx<0) return;
  const newVisIdx = visIdx + dir;
  if(newVisIdx<0||newVisIdx>=list.length) return;
  const targetId = list[newVisIdx].id;
  const srcIdx = allList.findIndex(a=>a.id===id);
  const tgtIdx = allList.findIndex(a=>a.id===targetId);
  const [moved] = allList.splice(srcIdx,1);
  allList.splice(tgtIdx,0,moved);
  save(true); renderArtList();
}

function renderArtList(){
  const el=document.getElementById('artList');
  let list=showingTrash
    ? state.articles.filter(a=>a.deleted)
    : state.articles.filter(a=>!a.deleted);
  // Apply status filter (only when not in trash)
  if(!showingTrash){
    if(artFilter==='active') list=list.filter(a=>!a.status||a.status==='writing'||a.status==='review');
    else if(artFilter!=='all') list=list.filter(a=>(a.status||'writing')===artFilter);
  }
  updateFilterCounts();
  if(!list.length){el.innerHTML=`<div style="padding:12px;font-size:11px;color:var(--tx3);text-align:center">${showingTrash?'ゴミ箱は空です':artFilter!=='all'&&artFilter!=='active'?'該当する案件がありません':'案件がありません'}</div>`;return;}
  if(showingTrash){
    el.innerHTML=list.map(a=>`<div class="art-item" style="opacity:0.75">
      <div class="art-item-title">${esc(a.title)}</div>
      <div class="art-item-meta">${a.deletedAt||''}</div>
      <div style="display:flex;gap:4px;margin-top:5px">
        <button class="new-art-btn" style="flex:1;justify-content:center" onclick="restoreArticle('${a.id}',event)"><i class="ti ti-restore"></i>復元</button>
        <button class="new-art-btn" style="flex:1;justify-content:center;color:#E24B4A;border-color:#F7C1C1" onclick="permanentDelete('${a.id}',event)"><i class="ti ti-trash-x"></i>完全削除</button>
      </div></div>`).join('');
    return;
  }
  el.innerHTML=list.map((a,i)=>`<div class="art-item${a.id===state.currentId?' active':''}" id="ai_${a.id}" draggable="true"
    ondragstart="artDragStart(event,'${a.id}')"
    ondragover="artDragOver(event)"
    ondrop="artDrop(event,'${a.id}')"
    ondragend="artDragEnd(event)"
    onclick="selectArticle('${a.id}')">
    <div style="display:flex;align-items:center;gap:3px">
      <i class="ti ti-grip-vertical" style="font-size:12px;color:var(--tx3);cursor:grab;flex-shrink:0"></i>
      <div class="art-item-title" id="at_${a.id}" ondblclick="startRename('${a.id}',event)" style="flex:1">${esc(a.title)}</div>
      <div style="display:flex;gap:1px;flex-shrink:0">
        <button class="art-move-btn" onclick="moveArt('${a.id}',-1,event)" title="上へ"><i class="ti ti-chevron-up" style="font-size:10px"></i></button>
        <button class="art-move-btn" onclick="moveArt('${a.id}',1,event)" title="下へ"><i class="ti ti-chevron-down" style="font-size:10px"></i></button>
        <button class="art-item-del" onclick="deleteArticle('${a.id}',event)"><i class="ti ti-trash" style="font-size:11px"></i></button>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:3px">
      <div class="art-item-meta">${a.createdAt} · 引用${(a.sources||[]).length}件</div>
      <span class="status-badge status-${a.status||'writing'}" onclick="cycleStatus('${a.id}',event)">${statusLabel(a.status||'writing')}</span>
    </div></div>`).join('');
}

// ── editor ──
function renderEditor(){
  const art=getCurrentArticle();
  document.getElementById('editor').value=art?art.text:'';
  const hl=document.getElementById('headlineInput');
  if(hl) hl.value=(art&&art.headline)||'';
  updateFooter();
  updateLineNumbers();
  setTimeout(()=>applyColumnLayout(),30);
}






function updateLineGutter(){
  const ta = document.getElementById('editor');
  const inner = document.getElementById('lineGutterInner');
  const scroll = document.getElementById('editorScroll');
  if(!ta || !inner || !scroll) return;
  const lineH = parseFloat(window.getComputedStyle(ta).lineHeight) || 30;
  const totalLines = ta.value === '' ? 1 : ta.value.split('\n').length;
  const padTop = 36;
  let html = '';
  for(let i = 5; i <= totalLines + 5; i += 5){
    const top = padTop + (i - 1) * lineH - scroll.scrollTop;
    html += `<div class="line-num-label" style="top:${top}px">${i}</div>`;
  }
  inner.innerHTML = html;
  inner.style.height = (padTop + totalLines * lineH) + 'px';
}

function updateLineNumbers(){
  const ta = document.getElementById('editor');
  const inner = document.getElementById('editorInner');
  const gutter = document.getElementById('lineGutter');
  if(!ta || !inner || !gutter) return;

  const lineH = 30; // font-size:15px * line-height:2
  const padTop = 36;
  const scrollTop = inner.scrollTop;
  const gutterH = inner.clientHeight;
  const totalLines = ta.value === '' ? 1 : ta.value.split('\n').length;
  // Show numbers up to totalLines + buffer, minimum 50 lines
  const maxLine = Math.max(totalLines + 10, 50);

  const lines = [];
  for(let i = 5; i <= maxLine; i += 5){
    const top = padTop + (i - 1) * lineH - scrollTop;
    // Only render if visible in gutter
    if(top < -lineH || top > gutterH + lineH) continue;
    lines.push(`<div style="position:absolute;right:4px;top:${top}px;font-size:10px;font-weight:600;color:#1D9E75;font-family:-apple-system,sans-serif;line-height:1;user-select:none">${i}</div>`);
  }
  gutter.style.position = 'relative';
  gutter.innerHTML = lines.join('');
}


function onHeadlineInput(val){
  const art = getCurrentArticle();
  if(!art) return;
  art.headline = val;
  // Update article title to match headline
  if(val.trim()){
    art.title = val.trim();
    renderArtList();
  }
  try{localStorage.setItem(SK, JSON.stringify(state));}catch(e){}
}

function updateFooter(){
  const art=getCurrentArticle();if(!art)return;
  const text=art.text||'';const paras=getParas(text);
  let lines=0;text.split('\n').forEach(l=>{lines+=l.length?Math.ceil(l.length/currentColWidth)||1:1;});
  document.getElementById('charCount').textContent=text.length.toLocaleString()+' 文字';
  document.getElementById('lineCount').textContent=lines+' 行';
  document.getElementById('paraCount').textContent=paras.length+' 段落';
  if(activePara){const p=paras.find(x=>x.num===activePara);document.getElementById('activeParaInfo').textContent=p?`▌段落${activePara}: 「${p.text.slice(0,20)}${p.text.length>20?'…':''}」`:'';
  }else{document.getElementById('activeParaInfo').textContent='';}
}
function getParaAtCursor(){
  if(currentColWidth<=24){
    const focused=document.activeElement;
    if(focused&&focused.closest&&focused.closest('#colEditor'))return getParaAtCursorCol(focused);
    return activePara;
  }
  const ta=document.getElementById('editor');
  const pos=ta.selectionStart;
  const lines=ta.value.substring(0,pos).split('\n');
  const lineIdx=lines.length-1;
  const paras=getParas(ta.value);
  for(let i=paras.length-1;i>=0;i--){if(paras[i].lineIdx<=lineIdx)return paras[i].num;}
  return null;
}
function getParaAtCursorCol(colTa){
  const pos=colTa.selectionStart;
  const lineInCol=colTa.value.substring(0,pos).split('\n').length-1;
  const startLine=parseInt(colTa.dataset.startLine||'0');
  const absLineIdx=startLine+lineInCol;
  const ta=document.getElementById('editor');
  const allLines=ta.value.split('\n');
  let paraCount=0;
  for(let i=0;i<=absLineIdx&&i<allLines.length;i++){if(allLines[i].trim())paraCount++;}
  return paraCount||null;
}
const editor=document.getElementById('editor');
editor.addEventListener('input',()=>{autoSave();document.getElementById('paraHighlight').style.display='none';});
editor.addEventListener('click',()=>{const p=getParaAtCursor();if(p!==activePara){activePara=p;updateFooter();renderSources();}document.getElementById('paraHighlight').style.display='none';});
editor.addEventListener('keyup',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Home','End','Enter'].includes(e.key)){
    const p=getParaAtCursor();if(p!==activePara){activePara=p;updateFooter();renderSources();}
  }
});

// ── column layout ──
function updateColWidth(val){
  currentColWidth = parseInt(val);
  document.getElementById('colWidthLabel').textContent = val + '字';
  applyColumnLayout();
  updateFooter();
}

function applyColumnLayout(){
  const ta = document.getElementById('editor');
  const colEd = document.getElementById('colEditor');
  const wrap = document.getElementById('editorWrap');
  if(!ta || !wrap) return;

  // Always use single-column textarea (no multi-col in edit mode)
  if(colEd) colEd.style.display = 'none';
  ta.style.display = '';
  ta.style.position = '';
  ta.style.opacity = '';
  ta.style.height = '100%';
  ta.style.minHeight = '400px';
  setReadOnlyMode(false);

  // Constrain textarea width based on character count
  // Measure actual character width
  const sp = document.createElement('span');
  sp.style.cssText = 'position:fixed;top:-9999px;left:-9999px;font-family:Georgia,serif;font-size:15px;white-space:pre';
  sp.textContent = 'あ'.repeat(currentColWidth);
  document.body.appendChild(sp);
  const colPx = sp.offsetWidth;
  document.body.removeChild(sp);

  const wrapInner = wrap.clientWidth - 64; // subtract padding
  const targetW = Math.min(colPx, wrapInner);

  ta.style.width = targetW + 'px';
  ta.style.maxWidth = '100%';
}


function setReadOnlyMode(on){
  const topbar=document.getElementById('topbar'),label=document.getElementById('readonlyLabel');
  topbar.style.background='var(--bg)';topbar.style.borderBottom='0.5px solid var(--bd)';
  if(label)label.style.display='none';
}


// ── source pane ──
function renderSources(){
  const art=getCurrentArticle();const body=document.getElementById('sourceBody');const title=document.getElementById('sourceHeadTitle');
  if(!art){body.innerHTML='<div class="source-empty">案件を選択してください</div>';return;}
  const pending=window._pendingClips&&window._pendingClips.length;
  title.textContent=activePara?`段落${activePara}の引用元 / 全${art.sources.length}件`:`引用元一覧 (${art.sources.length}件)`;
  let html='';
  if(pending)html+=`<div class="pending-banner"><p><i class="ti ti-clipboard-check"></i> <strong>${window._pendingClips.length}件</strong> 届いています</p><button onclick="importPending()">振り分け</button></div>`;
  if(!art.sources.length&&!pending){html+='<div class="source-empty"><i class="ti ti-link-off" style="font-size:24px;display:block;margin-bottom:8px"></i>引用元がまだありません</div>';body.innerHTML=html;renderSrcTagFilters();return;}
  renderSrcTagFilters();
  let sourcesToShow=[...art.sources];
  if(srcTagFilter) sourcesToShow=sourcesToShow.filter(s=>(s.tags||[]).includes(srcTagFilter));
  const sorted=sourcesToShow.sort((a,b)=>{const ap=a.paraNum||999,bp=b.paraNum||999;return ap-bp;});
  html+=sorted.map(s=>{
    const isH=activePara&&s.paraNum===activePara;
    const badge=s.paraNum?`<span class="sc-para-badge linked" onclick="openParaPicker(event,'${s.id}')"><i class="ti ti-link" style="font-size:9px"></i>段落${s.paraNum}</span>`:`<span class="sc-para-badge unlinked" onclick="openParaPicker(event,'${s.id}')"><i class="ti ti-link-off" style="font-size:9px"></i>紐付け</span>`;
    const isInt=s.sourceKind==='interview';
    const intMeta=isInt?[s.who?`<strong>${esc(s.who)}</strong>`:'',s.interviewDate?esc(s.interviewDate):'',s.place?esc(s.place):''].filter(Boolean).join(' · '):'';
    return `<div class="sc${isH?' highlighted':''}" id="sc_${s.id}" onclick="onSourceCardClick('${s.id}')" style="cursor:pointer">
      <div class="sc-top"><div style="flex:1;min-width:0;display:flex;align-items:center;flex-wrap:wrap;gap:3px"><span class="stag ${tagClass(s.type)}">${esc(s.type)}</span>${badge}${s.note&&!isInt?`<span class="sc-note">${esc(s.note)}</span>`:''}</div>
      <button class="sbtn del" onclick="deleteSource(event,'${s.id}')"><i class="ti ti-trash" style="font-size:11px"></i></button></div>
      ${isInt&&intMeta?`<div style="font-size:11px;color:var(--tx);margin-bottom:4px">${intMeta}</div>`:''}
      ${s.quote?`<div class="sc-quote">${esc(s.quote.length>140?s.quote.slice(0,140)+'…':s.quote)}</div>`:''}
      ${s.translation?`<div class="sc-trans">和訳: ${esc(s.translation)}</div>`:''}
      ${(s.tags||[]).length?`<div style="margin:4px 0;display:flex;flex-wrap:wrap;gap:3px">${s.tags.map(t=>`<span class="src-tag-chip">${esc(t)}</span>`).join('')}</div>`:''}
      ${!isInt&&s.url?`<div class="sc-url"><a href="${esc(s.url)}" target="_blank">${esc(s.url)}</a></div>`:''}
      <div class="sc-actions">
        <button class="sbtn" onclick="copyQuote('${s.id}')"><i class="ti ti-copy" style="font-size:11px"></i>原文コピー</button>
        <button class="sbtn" onclick="openAddSourceModal('${s.id}')"><i class="ti ti-edit" style="font-size:11px"></i>編集</button>
        <button class="sbtn" onclick="moveSourceToStock('${s.id}')"><i class="ti ti-bookmark" style="font-size:11px"></i>ストックへ</button>
      </div>
      <div id="vr_${s.id}"></div>
    </div>`;
  }).join('');
  body.innerHTML=html;
  if(activePara){const first=body.querySelector('.sc.highlighted');if(first)setTimeout(()=>first.scrollIntoView({behavior:'smooth',block:'nearest'}),50);}
}

// ── para picker ──
function openParaPicker(e,sourceId){
  e.stopPropagation();const art=getCurrentArticle();if(!art)return;
  pickerSourceId=sourceId;const paras=getParas(art.text);const s=art.sources.find(x=>x.id===sourceId);
  const picker=document.getElementById('paraPicker');
  let html=`<div class="para-picker-head">段落を選んで紐付け</div>`;
  if(!paras.length)html+='<div style="padding:10px 12px;font-size:12px;color:var(--tx3)">原稿に段落がありません</div>';
  else html+=paras.map(p=>`<div class="para-picker-item${s&&s.paraNum===p.num?' active':''}" onclick="linkToPara(${p.num})"><div class="pnum">段落 ${p.num}</div><div>${esc(p.text.slice(0,50))}${p.text.length>50?'…':''}</div></div>`).join('');
  if(s&&s.paraNum)html+=`<div class="para-picker-unlink" onclick="linkToPara(null)"><i class="ti ti-link-off" style="font-size:12px"></i>紐付けを解除</div>`;
  picker.innerHTML=html;picker.style.display='block';
  const rect=e.target.getBoundingClientRect();let top=rect.bottom+6,left=rect.left;
  if(left+260>window.innerWidth)left=window.innerWidth-268;if(top+300>window.innerHeight)top=rect.top-306;
  picker.style.top=top+'px';picker.style.left=left+'px';
}
function linkToPara(num){const art=getCurrentArticle();if(!art||!pickerSourceId)return;const s=art.sources.find(x=>x.id===pickerSourceId);if(s)s.paraNum=num||null;save(true);closePicker();renderSources();}
function closePicker(){document.getElementById('paraPicker').style.display='none';pickerSourceId=null;}
document.addEventListener('click',e=>{const p=document.getElementById('paraPicker');if(p.style.display!=='none'&&!p.contains(e.target))closePicker();});

// ── add/edit source ──
let editingSourceId=null,currentSrcTab='web',srcTagFilter=null;

function getAllSourceTags(){
  const art = getCurrentArticle();
  if(!art) return [];
  return [...new Set((art.sources||[]).flatMap(s=>s.tags||[]))];
}

function showSrcTagSuggestions(){
  const allTags = getAllSourceTags();
  const hints = ['srcTagHint','srcTagHint2'];
  hints.forEach(hintId => {
    const hint = document.getElementById(hintId);
    if(!hint) return;
    hint.innerHTML = allTags.length
      ? allTags.map(t=>`<span class="src-tag-chip" style="cursor:pointer" onclick="addSrcTagToInput('${esc(t)}')">${esc(t)}</span>`).join('')
      : '';
  });
}

function addSrcTagToInput(tag){
  const input = document.getElementById(currentSrcTab==='interview'?'iTags':'nTags');
  if(!input) return;
  const cur = input.value.trim();
  const tags = cur ? cur.split(/[,、]/).map(t=>t.trim()).filter(Boolean) : [];
  if(!tags.includes(tag)) tags.push(tag);
  input.value = tags.join(', ');
}

function renderSrcTagFilters(){
  const bar = document.getElementById('srcTagFilterBar');
  const filtersEl = document.getElementById('srcTagFilters');
  const clearBtn = document.getElementById('clearTagBtn');
  const tags = getAllSourceTags();
  if(!tags.length){ if(bar) bar.style.display='none'; return; }
  if(bar) bar.style.display='flex';
  if(filtersEl) filtersEl.innerHTML = tags.map(t =>
    `<div class="src-tag-filter-btn${srcTagFilter===t?' active':''}" onclick="setSrcTagFilter('${esc(t)}')">${esc(t)}</div>`
  ).join('');
  if(clearBtn) clearBtn.style.display = srcTagFilter ? '' : 'none';
}

function setSrcTagFilter(tag){
  srcTagFilter = srcTagFilter===tag ? null : tag;
  renderSrcTagFilters();
  renderSources();
}

function clearSrcTagFilter(){
  srcTagFilter = null;
  renderSrcTagFilters();
  renderSources();
}
function switchSrcTab(tab){
  currentSrcTab=tab;
  document.getElementById('tab-web').classList.toggle('active',tab==='web');
  document.getElementById('tab-interview').classList.toggle('active',tab==='interview');
  document.getElementById('srcForm-web').style.display=tab==='web'?'':'none';
  document.getElementById('srcForm-interview').style.display=tab==='interview'?'':'none';
}
function openAddSourceModal(sourceId){
  editingSourceId=sourceId;const art=getCurrentArticle();
  if(sourceId){
    const s=art.sources.find(x=>x.id===sourceId);if(!s)return;
    document.getElementById('addSourceTitle').textContent='引用元を編集';
    if(s.sourceKind==='interview'){
      switchSrcTab('interview');
      document.getElementById('iWho').value=s.who||'';document.getElementById('iDate').value=s.interviewDate||'';
      document.getElementById('iPlace').value=s.place||'';document.getElementById('iFile').value=s.fileName||'';
      document.getElementById('iQuote').value=s.quote||'';document.getElementById('iNote').value=s.note||'';
      document.getElementById('iTags').value=(s.tags||[]).join(', ');
    }else{
      switchSrcTab('web');
      document.getElementById('nUrl').value=s.url||'';document.getElementById('nType').value=s.type||'その他';
      document.getElementById('nQuote').value=s.quote||'';document.getElementById('nTrans').value=s.translation||'';
      document.getElementById('nNote').value=s.note||'';
      document.getElementById('nTags').value=(s.tags||[]).join(', ');
    }
  }else{
    document.getElementById('addSourceTitle').textContent='引用元を追加';
    switchSrcTab('web');
    ['nUrl','nQuote','nTrans','nNote','nTags'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('nType').value='その他';
    ['iWho','iDate','iPlace','iFile','iQuote','iNote','iTags'].forEach(id=>document.getElementById(id).value='');
  }
  document.getElementById('addSourceModal').classList.remove('hidden');
  showSrcTagSuggestions();
}
function addSource(){
  const art=getCurrentArticle();if(!art)return;
  const existing=editingSourceId?art.sources.find(s=>s.id===editingSourceId)?.paraNum||null:activePara||null;
  let src;
  if(currentSrcTab==='interview'){
    const who=document.getElementById('iWho').value.trim(),quote=document.getElementById('iQuote').value.trim();
    if(!who&&!quote){alert('発言者か発言内容を入力してください');return;}
    const rawITags=document.getElementById('iTags').value.trim();
    src={id:editingSourceId||uid(),sourceKind:'interview',url:'',who,interviewDate:document.getElementById('iDate').value.trim(),place:document.getElementById('iPlace').value.trim(),fileName:document.getElementById('iFile').value.trim(),quote,translation:'',type:'独自取材',note:document.getElementById('iNote').value.trim(),paraNum:existing,tags:rawITags?rawITags.split(/[,、]/).map(t=>t.trim()).filter(Boolean):[]};
  }else{
    const url=document.getElementById('nUrl').value.trim(),quote=document.getElementById('nQuote').value.trim();
    if(!url&&!quote){alert('URLか引用テキストを入力してください');return;}
    const rawTags=document.getElementById('nTags').value.trim();
    src={id:editingSourceId||uid(),sourceKind:'web',url,quote,translation:document.getElementById('nTrans').value.trim(),type:document.getElementById('nType').value,note:document.getElementById('nNote').value.trim(),paraNum:existing,tags:rawTags?rawTags.split(/[,、]/).map(t=>t.trim()).filter(Boolean):[]};
  }
  if(editingSourceId){const idx=art.sources.findIndex(s=>s.id===editingSourceId);if(idx>=0)art.sources[idx]=src;}
  else art.sources.push(src);
  save(true);renderSources();renderArtList();closeModal('addSourceModal');
}
function deleteSource(e,id){
  e.stopPropagation();const art=getCurrentArticle();if(!art)return;
  if(!confirm('削除しますか？'))return;
  art.sources=art.sources.filter(s=>s.id!==id);save(true);renderSources();renderArtList();
}
function copyQuote(id){
  const art=getCurrentArticle();if(!art)return;const s=art.sources.find(x=>x.id===id);if(!s)return;
  navigator.clipboard.writeText(s.quote||s.url).catch(()=>{});
  const btn=document.querySelector(`#sc_${id} .sbtn`);
  if(btn){const o=btn.innerHTML;btn.innerHTML='<i class="ti ti-check" style="font-size:11px"></i>コピー完了';setTimeout(()=>btn.innerHTML=o,1500);}
}

function highlightParaInEditor(paraNum){
  const ta = document.getElementById('editor');
  const hl = document.getElementById('paraHighlight');
  if(!ta || !paraNum){ if(hl) hl.style.display='none'; return; }

  const text = ta.value;
  const paras = getParas(text);
  const para = paras.find(p => p.num === paraNum);
  if(!para){ if(hl) hl.style.display='none'; return; }

  // Select the paragraph text in the textarea to make it visible
  const allLines = text.split('\n');
  let charPos = 0;
  for(let i = 0; i < para.lineIdx; i++){
    charPos += allLines[i].length + 1;
  }
  const paraStart = charPos;
  const paraEnd = charPos + para.text.length;

  // Focus and select
  ta.focus();
  ta.setSelectionRange(paraStart, paraEnd);

  // Also show the green overlay box using scrollTop
  if(hl){
    const cs = window.getComputedStyle(ta);
    const lineH = parseFloat(cs.lineHeight) || 32;
    const padTop = 36;
    const topPx = padTop + para.lineIdx * lineH;

    // Scroll textarea so paragraph is in view
    ta.scrollTop = Math.max(0, topPx - ta.clientHeight / 3);

    setTimeout(() => {
      const visTop = padTop + para.lineIdx * lineH - ta.scrollTop;
      hl.style.display = 'block';
      hl.style.top = visTop + 'px';
      hl.style.height = (lineH * Math.max(1, Math.ceil(para.text.length / 30)) + 6) + 'px';
      hl.style.left = '28px';
      hl.style.right = '28px';
    }, 30);
  }
}


function onSourceCardClick(id){
  const art=getCurrentArticle();if(!art)return;
  const s=art.sources.find(x=>x.id===id);if(!s)return;
  if(s.paraNum){
    activePara=s.paraNum;
    updateFooter();
    renderSources();
    highlightParaInEditor(s.paraNum);
  }
}
function moveSourceToStock(id){
  const art=getCurrentArticle();if(!art)return;
  const s=art.sources.find(x=>x.id===id);if(!s)return;
  if(!state.stocks)state.stocks=[];
  state.stocks.unshift({id:uid(),url:s.url||'',quote:s.quote||'',note:s.note||s.who||'',tags:[],savedAt:new Date().toLocaleDateString('ja'),type:s.type});
  art.sources=art.sources.filter(x=>x.id!==id);
  save(true);renderSources();renderArtList();renderStockPane();updateStockCount();
}

// ── stock pane ──
function toggleStockPane(){
  stockPaneVisible=!stockPaneVisible;
  const pane=document.getElementById('stockPane'),btn=document.getElementById('stockBtn');
  pane.classList.toggle('open',stockPaneVisible);
  if(btn)btn.classList.toggle('active',stockPaneVisible);
  if(stockPaneVisible)renderStockPane();
}
function switchStockTab(tab){
  stockTab=tab;
  document.getElementById('stab-all').classList.toggle('active',tab==='all');
  document.getElementById('stab-unused').classList.toggle('active',tab==='unused');
  renderStockPane();
}
function renderStockPane(){
  if(!stockPaneVisible)return;
  const stocks=state.stocks||[];
  let allItems=stocks.map(s=>({...s,_kind:'stock',_artTitle:null}));
  if(stockTab==='all'){
    (state.articles||[]).filter(a=>!a.deleted).forEach(art=>{
      (art.sources||[]).forEach(s=>allItems.push({...s,_kind:'source',_artTitle:art.title,_artId:art.id,tags:s.tags||[]}));
    });
  }
  const allTags=[...new Set(allItems.flatMap(s=>s.tags||[]))];
  const tagBar=document.getElementById('stockTagBar');
  tagBar.innerHTML=[`<button class="stock-tag-btn${!stockTagFilter?' active':''}" onclick="setStockTag(null)">すべて</button>`,...allTags.map(t=>`<button class="stock-tag-btn${stockTagFilter===t?' active':''}" onclick="setStockTag('${esc(t)}')">${esc(t)}</button>`)].join('');
  const filtered=stockTagFilter?allItems.filter(s=>(s.tags||[]).includes(stockTagFilter)):allItems;
  updateStockCount();
  const body=document.getElementById('stockBody');
  if(!filtered.length){body.innerHTML=`<div class="source-empty">${stockTab==='unused'?'未使用のストックがありません':'引用元がありません'}</div>`;return;}
  body.innerHTML=filtered.map(item=>{
    const isStock=item._kind==='stock';
    const artLabel=item._artTitle?`<span style="font-size:9px;background:var(--gbg);color:var(--gtx);padding:1px 5px;border-radius:99px">${esc(item._artTitle)}</span>`:`<span style="font-size:9px;background:var(--bg2);color:var(--tx3);padding:1px 5px;border-radius:99px;border:0.5px dashed var(--bd2)">未使用</span>`;
    return `<div class="sc">
      <div class="sc-top"><div style="flex:1;min-width:0;display:flex;align-items:center;flex-wrap:wrap;gap:3px"><span class="stag ${tagClass(item.type||'その他')}">${esc(item.type||'その他')}</span>${artLabel}${(item.tags||[]).map(t=>`<span style="font-size:9px;background:var(--bbg);color:var(--btx);padding:1px 5px;border-radius:99px">${esc(t)}</span>`).join('')}</div>
      <button class="sbtn del" onclick="${isStock?`deleteStock('${item.id}')`:`deleteSourceFromStock('${item._artId}','${item.id}')`}"><i class="ti ti-trash" style="font-size:10px"></i></button></div>
      ${item.note?`<div style="font-size:11px;color:var(--tx2);margin-bottom:3px">${esc(item.note)}</div>`:''}
      ${item.quote?`<div class="sc-quote" style="font-size:11px">${esc(item.quote.slice(0,120))}${item.quote.length>120?'…':''}</div>`:''}
      ${item.url?`<div class="sc-url"><a href="${esc(item.url)}" target="_blank">${esc(item.url)}</a></div>`:''}
      <div class="sc-actions">
        ${isStock?`<button class="sbtn" onclick="openMoveToArticlePicker('${item.id}','stock','','copy')"><i class="ti ti-copy" style="font-size:10px"></i>コピー</button><button class="sbtn" onclick="openMoveToArticlePicker('${item.id}','stock','','move')"><i class="ti ti-transfer" style="font-size:10px"></i>移動</button><button class="sbtn" onclick="openEditStock('${item.id}')"><i class="ti ti-edit" style="font-size:10px"></i>編集</button>`:''}
        ${!isStock?`<button class="sbtn" onclick="openMoveToArticlePicker('${item.id}','source','${item._artId}')"><i class="ti ti-copy" style="font-size:10px"></i>他の案件にコピー</button><button class="sbtn" onclick="moveSourceToStockById('${item._artId}','${item.id}')"><i class="ti ti-bookmark" style="font-size:10px"></i>ストックへ</button>`:''}
      </div>
    </div>`;
  }).join('');
}
function setStockTag(tag){stockTagFilter=tag;renderStockPane();}
function updateStockCount(){
  const stocks=state.stocks||[];
  const total=stocks.length+(state.articles||[]).filter(a=>!a.deleted).reduce((n,a)=>n+(a.sources||[]).length,0);
  const el=document.getElementById('stockCount');
  if(el){el.textContent=total?total+'件':'';el.style.display=total?'':'none';}
}
function moveSourceToStockById(artId,sourceId){
  const art=state.articles.find(a=>a.id===artId);if(!art)return;
  const s=art.sources.find(x=>x.id===sourceId);if(!s)return;
  if(!state.stocks)state.stocks=[];
  state.stocks.unshift({id:uid(),url:s.url||'',quote:s.quote||'',note:s.note||s.who||'',tags:[],savedAt:new Date().toLocaleDateString('ja'),type:s.type});
  art.sources=art.sources.filter(x=>x.id!==sourceId);
  save(true);if(state.currentId===artId)renderSources();renderArtList();renderStockPane();updateStockCount();
}
function deleteSourceFromStock(artId,sourceId){
  if(!confirm('削除しますか？'))return;
  const art=state.articles.find(a=>a.id===artId);if(!art)return;
  art.sources=art.sources.filter(x=>x.id!==sourceId);
  save(true);if(state.currentId===artId)renderSources();renderArtList();renderStockPane();
}

// ── move to article picker ──
function openMoveToArticlePicker(itemId,kind,fromArtId,mode){
  const activeArts=(state.articles||[]).filter(a=>!a.deleted);
  if(!activeArts.length){alert('案件がありません。先に案件を作成してください。');return;}
  let existing=document.getElementById('moveToArtModal');if(existing)existing.remove();
  const modal=document.createElement('div');modal.id='moveToArtModal';modal.className='modal-bg';modal.style.zIndex='400';
  const isMove = mode === 'move';
  modal.innerHTML=`<div class="modal" style="width:420px">
    <h2><i class="ti ti-${isMove?'transfer':'copy'}"></i> ${isMove?'移動先を選択（ストックから削除されます）':'コピー先を選択（ストックに残ります）'}</h2>
    <div style="max-height:320px;overflow-y:auto;margin-bottom:14px">
      ${activeArts.map(a=>`<div class="ali${a.id===state.currentId?' active':''}" onclick="confirmMoveToArt('${itemId}','${kind}','${fromArtId}','${a.id}','${mode||'copy'}')">
        <div><div class="ali-title">${esc(a.title)}</div><div class="ali-meta">${a.createdAt} · 引用${(a.sources||[]).length}件</div></div>
        <span class="status-badge status-${a.status||'writing'}">${statusLabel(a.status||'writing')}</span></div>`).join('')}
    </div>
    <div class="modal-footer"><button class="mbtn" onclick="document.getElementById('moveToArtModal').remove()">キャンセル</button></div>
  </div>`;
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});
  document.body.appendChild(modal);
}
function confirmMoveToArt(itemId,kind,fromArtId,toArtId,mode){
  const toArt=state.articles.find(a=>a.id===toArtId);if(!toArt)return;
  document.getElementById('moveToArtModal')?.remove();
  if(kind==='stock'){
    const s=(state.stocks||[]).find(x=>x.id===itemId);if(!s)return;
    toArt.sources.push({id:uid(),url:s.url||'',quote:s.quote||'',translation:'',type:s.type||'その他',note:s.note||'',paraNum:null,sourceKind:'web',tags:s.tags||[]});
    // If move mode, delete from stock
    if(mode==='move') state.stocks=(state.stocks||[]).filter(x=>x.id!==itemId);
  }else{
    const fromArt=state.articles.find(a=>a.id===fromArtId);if(!fromArt)return;
    const s=fromArt.sources.find(x=>x.id===itemId);if(!s)return;
    // Copy to target article, keep in source article
    toArt.sources.push({...s,id:uid(),paraNum:null});
  }
  save(true);renderSources();renderArtList();renderStockPane();updateStockCount();
  // Show confirmation
  const toArtTitle=toArt.title;
  const btn=document.querySelector('#stockPane .source-add-btn');
  const flash=document.createElement('div');
  flash.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;z-index:500;box-shadow:0 4px 16px rgba(0,0,0,0.15)';
  flash.textContent=`「${toArtTitle}」にコピーしました`;
  document.body.appendChild(flash);
  setTimeout(()=>flash.remove(),2500);
}

// ── stock add/edit ──
let editingStockId=null;
function openAddStockModal(prefill){
  editingStockId=null;
  document.getElementById('sUrl').value=prefill?.url||'';
  document.getElementById('sQuote').value=prefill?.quote||'';
  document.getElementById('sNote').value=prefill?.note||'';
  document.getElementById('sTags').value=(prefill?.tags||[]).join(', ');
  document.getElementById('addStockModal').classList.remove('hidden');
  showTagSuggestions();
}
function openEditStock(id){
  const s=(state.stocks||[]).find(x=>x.id===id);if(!s)return;
  editingStockId=id;
  document.getElementById('sUrl').value=s.url||'';document.getElementById('sQuote').value=s.quote||'';
  document.getElementById('sNote').value=s.note||'';document.getElementById('sTags').value=(s.tags||[]).join(', ');
  document.getElementById('addStockModal').classList.remove('hidden');showTagSuggestions();
}
function showTagSuggestions(){
  const allTags=[...new Set([...(state.stocks||[]).flatMap(s=>s.tags||[]),...(state.articles||[]).flatMap(a=>(a.sources||[]).flatMap(s=>s.tags||[]))])];
  const hint=document.getElementById('existingTagsHint');if(!hint)return;
  hint.innerHTML=allTags.length?'<span style="font-size:10px;color:var(--tx3)">既存タグ: </span>'+allTags.map(t=>`<button onclick="addTagToInput('${esc(t)}')" style="font-size:10px;padding:1px 7px;border-radius:99px;border:0.5px solid var(--bd2);background:var(--bg2);cursor:pointer;margin:1px;color:var(--tx2)">${esc(t)}</button>`).join(''):'';
}
function addTagToInput(tag){
  const input=document.getElementById('sTags');const current=input.value.trim();
  const tags=current?current.split(/[,、]/).map(t=>t.trim()).filter(Boolean):[];
  if(!tags.includes(tag))tags.push(tag);input.value=tags.join(', ');
}
function saveStock(){
  if(!state.stocks)state.stocks=[];
  const url=document.getElementById('sUrl').value.trim(),quote=document.getElementById('sQuote').value.trim(),note=document.getElementById('sNote').value.trim();
  const tags=document.getElementById('sTags').value.trim().split(/[,、]/).map(t=>t.trim()).filter(Boolean);
  if(!url&&!quote&&!note){alert('URL、引用テキスト、メモのいずれかを入力してください');return;}
  const item={id:editingStockId||uid(),url,quote,note,tags,savedAt:new Date().toLocaleDateString('ja')};
  if(editingStockId){const idx=state.stocks.findIndex(s=>s.id===editingStockId);if(idx>=0)state.stocks[idx]=item;}
  else state.stocks.unshift(item);
  save(true);updateStockCount();renderStockPane();closeModal('addStockModal');
}
function deleteStock(id){
  if(!confirm('このストックを削除しますか？'))return;
  state.stocks=(state.stocks||[]).filter(s=>s.id!==id);
  save(true);updateStockCount();renderStockPane();
}

// ── import pending clips ──
function checkPending(){
  try{const raw=localStorage.getItem('reporter_pending_clips');if(!raw)return;window._pendingClips=JSON.parse(raw);localStorage.removeItem('reporter_pending_clips');renderSources();}catch(e){}
}
function checkPendingForStock(clips){
  if(!state.stocks)state.stocks=[];
  clips.forEach(c=>{state.stocks.unshift({id:uid(),url:c.url||'',quote:c.quote||'',note:c.title||'',tags:[],savedAt:new Date().toLocaleDateString('ja')});});
  save(true);updateStockCount();renderStockPane();
}
function importPending(){
  const clips=window._pendingClips||[];if(!clips.length)return;
  window._pendingClips=null;openImportPicker(clips);
}
function openImportPicker(clips){
  let existing=document.getElementById('importPickerModal');if(existing)existing.remove();
  const activeArts=(state.articles||[]).filter(a=>!a.deleted);
  const modal=document.createElement('div');modal.id='importPickerModal';modal.className='modal-bg';modal.style.zIndex='400';
  const preview=clips.slice(0,3).map(c=>`<div style="font-size:11px;padding:4px 8px;background:var(--bg2);border-radius:var(--r);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.quote?'"'+c.quote.slice(0,50)+'…"':c.url)}</div>`).join('');
  window._importClips=clips;
  modal.innerHTML=`<div class="modal" style="width:440px"><h2><i class="ti ti-clipboard-check"></i> ${clips.length}件のクリップをどこに保存しますか？</h2>
    <div style="margin-bottom:12px">${preview}${clips.length>3?`<div style="font-size:10px;color:var(--tx3);padding:2px 8px">他${clips.length-3}件</div>`:''}</div>
    <div style="font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:6px">保存先:</div>
    <div class="ali" onclick="importToStock()" style="border:0.5px solid var(--bd2);margin-bottom:4px"><div><div class="ali-title"><i class="ti ti-bookmark" style="color:var(--btx)"></i> ストックに保存</div><div class="ali-meta">後で案件に振り分けられます</div></div></div>
    ${activeArts.map(a=>`<div class="ali" onclick="importToArticle('${a.id}')"><div><div class="ali-title">${esc(a.title)}</div><div class="ali-meta">${a.createdAt} · 引用${(a.sources||[]).length}件</div></div><span class="status-badge status-${a.status||'writing'}">${statusLabel(a.status||'writing')}</span></div>`).join('')}
    <div class="modal-footer"><button class="mbtn" onclick="document.getElementById('importPickerModal').remove()">キャンセル</button></div>
  </div>`;
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});document.body.appendChild(modal);
}
function importToStock(){document.getElementById('importPickerModal')?.remove();checkPendingForStock(window._importClips||[]);window._importClips=null;if(!stockPaneVisible)toggleStockPane();}
function importToArticle(artId){
  document.getElementById('importPickerModal')?.remove();
  const art=state.articles.find(a=>a.id===artId);if(!art)return;
  (window._importClips||[]).forEach(c=>{art.sources.push({id:uid(),url:c.url||'',quote:c.quote||'',translation:'',type:c.sourceType||'その他',note:c.title||'',paraNum:null,sourceKind:'web'});});
  window._importClips=null;save(true);if(state.currentId===artId)renderSources();renderArtList();
}

window.addEventListener('storage',e=>{
  if(e.key==='reporter_pending_clips'&&e.newValue){
    try{window._pendingClips=JSON.parse(e.newValue);localStorage.removeItem('reporter_pending_clips');renderSources();}catch(err){}
  }
});

// ── verify copy ──
function copyAllForVerify(){
  const art=getCurrentArticle();if(!art)return;
  const paras=getParas(art.text);const srcs=art.sources.filter(s=>s.quote);
  if(!srcs.length){alert('引用テキストが登録された引用元がありません');return;}
  let text='【AI翻訳検証依頼】\n\n■ 案件: '+art.title+'\n\n';
  srcs.forEach((s,i)=>{
    const linkedPara=s.paraNum?paras.find(p=>p.num===s.paraNum):null;
    text+=`引用元 ${i+1} (${s.type})\n`;
    if(s.note)text+=`備考: ${s.note}\n`;
    text+=`原文: ${s.quote}\n`;
    if(s.translation)text+=`和訳: ${s.translation}\n`;
    if(linkedPara)text+=`原稿段落: ${linkedPara.text}\n`;
    text+=`URL: ${s.url}\n\n`;
  });
  text+='上記の引用元について、①原文と和訳の整合性、②原稿段落の記述と引用元の内容の整合性を検証してください。';
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.querySelector('.tbtn[onclick="copyAllForVerify()"]');
    if(btn){const o=btn.innerHTML;btn.innerHTML='<i class="ti ti-check"></i> コピー完了！Claudeに貼り付けて';setTimeout(()=>btn.innerHTML=o,3000);}
  }).catch(()=>alert('コピーに失敗しました'));
}

// ── utils ──
function closeModal(id){document.getElementById(id).classList.add('hidden');}
document.querySelectorAll('.modal-bg').forEach(bg=>{bg.addEventListener('click',function(e){if(e.target===this)this.classList.add('hidden');});});
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();saveArticle();}
  if(e.key==='Escape')closePicker();
});

load();
// Attach scroll listener after DOM ready
(function attachScrollListener(){
  const inner = document.getElementById('editorInner');
  if(inner){
    inner.addEventListener('scroll', updateLineNumbers);
  } else {
    setTimeout(attachScrollListener, 100);
  }
})();
</script>
