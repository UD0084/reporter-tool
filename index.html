<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記者原稿ツール</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --tx:#1a1a1a;--tx2:#666;--tx3:#aaa;
  --bd:rgba(0,0,0,0.08);--bd2:rgba(0,0,0,0.15);--bd3:rgba(0,0,0,0.25);
  --green:#1D9E75;--gbg:#E1F5EE;--gtx:#085041;
  --blue:#185FA5;--bbg:#E6F1FB;--btx:#0C447C;
  --abg:#FAEEDA;--atx:#633806;
  --pbg:#EEEDFE;--ptx:#3C3489;
  --r:8px;--rl:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1e1e1e;--bg2:#262626;--bg3:#2e2e2e;--tx:#e8e8e8;--tx2:#aaa;--tx3:#555;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);--bd3:rgba(255,255,255,0.22)}
}
html,body{height:100%;font-family:var(--font);background:var(--bg3);color:var(--tx)}
.shell{display:flex;height:100vh;flex-direction:column;overflow:hidden}

/* topbar */
.topbar{height:46px;background:var(--bg);border-bottom:0.5px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.art-select-btn{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:var(--r);border:0.5px solid var(--bd2);background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--tx);font-family:var(--font);max-width:260px}
.art-select-btn span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.topbar-sep{width:0.5px;height:20px;background:var(--bd2);flex-shrink:0}
.tbtn{padding:5px 11px;border-radius:var(--r);border:0.5px solid var(--bd2);background:transparent;cursor:pointer;font-size:12px;color:var(--tx2);font-family:var(--font);display:flex;align-items:center;gap:5px;white-space:nowrap}
.tbtn:hover{background:var(--bg2);color:var(--tx)}
.tbtn.primary{background:var(--green);color:#fff;border-color:var(--green)}
.tbtn.primary:hover{opacity:0.88}
.save-status{font-size:11px;color:var(--tx3);min-width:56px}

.workspace{display:flex;flex:1;overflow:hidden}

/* editor */
.editor-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.editor-wrap{flex:1;overflow-y:auto;padding:40px 56px}
.editor-textarea{width:100%;height:100%;min-height:400px;border:none;outline:none;resize:none;font-size:15px;line-height:1.95;color:var(--tx);background:transparent;font-family:'Georgia',serif;caret-color:var(--green)}
.editor-textarea::placeholder{color:var(--tx3)}
.editor-footer{padding:6px 56px;border-top:0.5px solid var(--bd);font-size:11px;color:var(--tx3);display:flex;gap:16px;flex-shrink:0}

/* source pane */
.source-pane{width:340px;border-left:0.5px solid var(--bd);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0;overflow:hidden}
.source-head{padding:10px 14px 8px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.source-head-title{font-size:12px;font-weight:500;color:var(--tx2)}
.source-add-btn{font-size:11px;padding:3px 9px;border-radius:var(--r);border:0.5px solid var(--bd2);background:var(--bg);cursor:pointer;color:var(--tx2);display:flex;align-items:center;gap:4px;font-family:var(--font)}
.source-add-btn:hover{background:var(--green);color:#fff;border-color:var(--green)}
.source-body{flex:1;overflow-y:auto;padding:10px 12px}
.source-empty{text-align:center;padding:40px 16px;color:var(--tx3);font-size:12px;line-height:1.9}

/* source cards */
.sc{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;transition:border-color 0.15s,box-shadow 0.15s;cursor:default}
.sc:hover{border-color:var(--bd2)}
.sc.highlighted{border-color:var(--green);box-shadow:0 0 0 2px rgba(29,158,117,0.15)}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px}
.stag{font-size:10px;padding:2px 7px;border-radius:var(--r);font-weight:500;display:inline-block}
.t-sns{background:var(--bbg);color:var(--btx)}.t-un{background:var(--gbg);color:var(--gtx)}
.t-research{background:var(--abg);color:var(--atx)}.t-media{background:var(--pbg);color:var(--ptx)}
.t-other{background:var(--bg2);color:var(--tx2)}
.sc-note{font-size:11px;color:var(--tx2);margin-left:5px}
.sc-para-badge{font-size:10px;padding:1px 7px;border-radius:var(--r);font-weight:500;margin-left:4px;cursor:pointer;display:inline-flex;align-items:center;gap:3px}
.sc-para-badge.linked{background:var(--gbg);color:var(--gtx)}
.sc-para-badge.unlinked{background:var(--bg2);color:var(--tx3);border:0.5px dashed var(--bd2)}
.sc-para-badge:hover{opacity:0.75}
.sc-quote{font-size:12px;font-style:italic;border-left:2px solid var(--bd2);padding-left:7px;margin:5px 0;line-height:1.5;color:var(--tx)}
.sc-trans{font-size:11px;color:var(--tx2);line-height:1.5;margin:3px 0}
.sc-url{font-size:10px;color:var(--tx3);word-break:break-all;margin-top:3px}
.sc-url a{color:var(--blue);text-decoration:none}
.sc-url a:hover{text-decoration:underline}
.sc-actions{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.sbtn{font-size:11px;padding:3px 8px;border:0.5px solid var(--bd);border-radius:var(--r);background:transparent;cursor:pointer;color:var(--tx2);display:flex;align-items:center;gap:3px;font-family:var(--font)}
.sbtn:hover{background:var(--bg2);color:var(--tx)}
.sbtn.del:hover{color:#E24B4A;border-color:#F7C1C1;background:#FCEBEB}
.sc-verify-result{font-size:11px;margin-top:6px;padding:6px 8px;background:var(--bg2);border-radius:var(--r);line-height:1.5}
.vstatus{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border-radius:var(--r);font-weight:500}
.s-ok{background:var(--gbg);color:var(--gtx)}.s-warn{background:var(--abg);color:var(--atx)}.s-pend{background:var(--bg2);color:var(--tx2)}
.spinner{display:inline-block;width:10px;height:10px;border:2px solid var(--bd2);border-top-color:var(--tx2);border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* para picker dropdown */
.para-picker{position:absolute;z-index:200;background:var(--bg);border:0.5px solid var(--bd2);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,0.12);width:260px;max-height:280px;overflow-y:auto}
.para-picker-head{padding:8px 12px;border-bottom:0.5px solid var(--bd);font-size:11px;font-weight:500;color:var(--tx2)}
.para-picker-item{padding:8px 12px;cursor:pointer;font-size:12px;color:var(--tx);line-height:1.4;border-bottom:0.5px solid var(--bd)}
.para-picker-item:hover{background:var(--gbg);color:var(--gtx)}
.para-picker-item.active{background:var(--gbg);color:var(--gtx)}
.para-picker-item .para-num{font-size:10px;font-weight:600;color:var(--tx3);margin-bottom:2px}
.para-picker-unlink{padding:8px 12px;cursor:pointer;font-size:12px;color:var(--tx3);display:flex;align-items:center;gap:5px}
.para-picker-unlink:hover{background:var(--bg2);color:var(--tx)}

/* pending banner */
.pending-banner{background:var(--gbg);border:0.5px solid #9FE1CB;border-radius:var(--r);padding:9px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.pending-banner p{font-size:12px;color:var(--gtx)}
.pending-banner button{font-size:11px;padding:3px 10px;background:var(--green);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-family:var(--font)}

/* modals */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:100;display:flex;align-items:center;justify-content:center}
.modal-bg.hidden{display:none}
.modal{background:var(--bg);border-radius:var(--rl);padding:24px;width:540px;max-width:92vw;max-height:85vh;overflow-y:auto;border:0.5px solid var(--bd2)}
.modal h2{font-size:15px;font-weight:500;margin-bottom:16px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.mbtn{padding:7px 16px;border-radius:var(--r);border:0.5px solid var(--bd2);background:transparent;cursor:pointer;font-size:13px;font-family:var(--font);color:var(--tx)}
.mbtn:hover{background:var(--bg2)}
.mbtn.primary{background:var(--green);color:#fff;border-color:var(--green)}
.mbtn.primary:hover{opacity:0.88}
.fl{margin-bottom:10px}
.flabel{font-size:10px;color:var(--tx2);font-weight:500;text-transform:uppercase;letter-spacing:0.04em;display:block;margin-bottom:3px}
.fi{width:100%;padding:7px 10px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);font-size:13px;outline:none;font-family:var(--font)}
.fi:focus{border-color:var(--bd3)}
textarea.fi{resize:vertical;min-height:56px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ali{padding:9px 12px;border-radius:var(--r);cursor:pointer;border:0.5px solid transparent;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.ali:hover{background:var(--bg2);border-color:var(--bd)}
.ali.active{background:var(--gbg);border-color:#9FE1CB}
.ali-title{font-size:13px;font-weight:500}
.ali-meta{font-size:11px;color:var(--tx3);margin-top:1px}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <button class="art-select-btn" onclick="openArticleModal()">
      <i class="ti ti-file-text" style="font-size:14px;flex-shrink:0"></i>
      <span id="currentTitle">案件を選択</span>
      <i class="ti ti-chevron-down" style="font-size:11px;flex-shrink:0"></i>
    </button>
    <div class="topbar-sep"></div>
    <button class="tbtn primary" onclick="saveArticle()"><i class="ti ti-device-floppy"></i> 保存</button>
    <span class="save-status" id="saveStatus"></span>
    <div style="flex:1"></div>
    <button class="tbtn" onclick="openAddSourceModal(null)"><i class="ti ti-plus"></i> 引用元を追加</button>
    <button class="tbtn" onclick="openVerifyModal()"><i class="ti ti-language"></i> AI翻訳検証</button>
  </div>

  <div class="workspace">
    <div class="editor-pane">
      <div class="editor-wrap">
        <textarea class="editor-textarea" id="editor" placeholder="原稿をここに入力してください..."></textarea>
      </div>
      <div class="editor-footer">
        <span id="charCount">0 文字</span>
        <span id="paraCount">0 段落</span>
        <span id="activeParaInfo"></span>
      </div>
    </div>

    <div class="source-pane">
      <div class="source-head">
        <span class="source-head-title">引用元一覧</span>
        <button class="source-add-btn" onclick="openAddSourceModal(null)"><i class="ti ti-plus" style="font-size:12px"></i>追加</button>
      </div>
      <div class="source-body" id="sourceBody"></div>
    </div>
  </div>
</div>

<!-- para picker (floating) -->
<div id="paraPicker" class="para-picker" style="display:none"></div>

<!-- article modal -->
<div class="modal-bg hidden" id="articleModal">
  <div class="modal">
    <h2>案件を選択 / 新規作成</h2>
    <div style="max-height:320px;overflow-y:auto;margin-bottom:14px" id="artListModal"></div>
    <button class="mbtn primary" onclick="newArticle()" style="width:100%"><i class="ti ti-plus"></i> 新規案件を作成</button>
    <div class="modal-footer"><button class="mbtn" onclick="closeModal('articleModal')">閉じる</button></div>
  </div>
</div>

<!-- add/edit source modal -->
<div class="modal-bg hidden" id="addSourceModal">
  <div class="modal">
    <h2 id="addSourceTitle">引用元を追加</h2>
    <div class="row2 fl">
      <div><label class="flabel">URL</label><input class="fi" id="nUrl" placeholder="https://..."></div>
      <div><label class="flabel">種別</label>
        <select class="fi" id="nType"><option>SNS/X</option><option>国連・公式</option><option>研究機関</option><option>メディア</option><option>その他</option></select>
      </div>
    </div>
    <div class="fl"><label class="flabel">引用テキスト（原文）</label><textarea class="fi" id="nQuote" placeholder="引用したい原文をここにペースト"></textarea></div>
    <div class="fl"><label class="flabel">和訳メモ（任意）</label><textarea class="fi" id="nTrans" placeholder="自分の訳をメモ（後でAI検証できます）" style="min-height:44px"></textarea></div>
    <div class="fl"><label class="flabel">備考</label><input class="fi" id="nNote" placeholder="誰の発言か、文脈など"></div>
    <div class="modal-footer">
      <button class="mbtn" onclick="closeModal('addSourceModal')">キャンセル</button>
      <button class="mbtn primary" onclick="addSource()"><i class="ti ti-check"></i> 保存</button>
    </div>
  </div>
</div>

<!-- verify modal -->
<div class="modal-bg hidden" id="verifyModal">
  <div class="modal">
    <h2><i class="ti ti-language"></i> AI翻訳検証</h2>
    <div id="verifyBody" style="max-height:55vh;overflow-y:auto"></div>
    <div class="modal-footer">
      <button class="mbtn" onclick="closeModal('verifyModal')">閉じる</button>
      <button class="mbtn primary" id="runVerifyBtn" onclick="runVerifyAll()"><i class="ti ti-robot"></i> 全件検証</button>
    </div>
  </div>
</div>

<script>
const SK='reporter_v4';
let state={articles:[],currentId:null};
let activePara=null;
let pickerSourceId=null;

function load(){
  try{const d=localStorage.getItem(SK);if(d)state=JSON.parse(d);}catch(e){}
  if(!state.articles.length)newArticle(true);
  else{renderTopbar();renderEditor();renderSources();}
  checkPending();
}
function save(silent){
  const art=getCurrentArticle();
  if(art)art.text=document.getElementById('editor').value;
  try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}
  if(!silent){
    const el=document.getElementById('saveStatus');
    el.textContent='保存しました ✓';
    setTimeout(()=>el.textContent='',2000);
  }
}
function autoSave(){
  const art=getCurrentArticle();
  if(art){art.text=document.getElementById('editor').value;updateFooter();}
  try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}
}
function saveArticle(){save(false);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function tagClass(t){return({'SNS/X':'t-sns','国連・公式':'t-un','研究機関':'t-research','メディア':'t-media','その他':'t-other'}[t]||'t-other');}
function getCurrentArticle(){return state.articles.find(a=>a.id===state.currentId)||null;}

function getParas(text){
  const lines=(text||'').split('\n');
  const result=[];
  lines.forEach((line,lineIdx)=>{
    if(line.trim()){
      result.push({num:result.length+1,text:line.trim(),lineIdx});
    }
  });
  return result;
}

function newArticle(silent){
  const a={id:uid(),title:'新規案件 '+(state.articles.length+1),createdAt:new Date().toLocaleDateString('ja'),text:'',sources:[]};
  state.articles.unshift(a);state.currentId=a.id;activePara=null;
  save(true);renderTopbar();renderEditor();renderSources();
  if(!silent)closeModal('articleModal');
}
function selectArticle(id){
  save(true);state.currentId=id;activePara=null;
  renderTopbar();renderEditor();renderSources();
  closeModal('articleModal');
}
function deleteArticle(id,e){
  e.stopPropagation();
  if(!confirm('この案件を削除しますか？'))return;
  state.articles=state.articles.filter(a=>a.id!==id);
  if(state.currentId===id)state.currentId=state.articles[0]?.id||null;
  save(true);renderTopbar();renderEditor();renderSources();renderArtListModal();
}
function renameArticle(id,e){
  e.stopPropagation();
  const art=state.articles.find(a=>a.id===id);if(!art)return;
  const v=prompt('案件名を変更:',art.title);
  if(v&&v.trim()){art.title=v.trim();save(true);renderTopbar();renderArtListModal();}
}

function renderTopbar(){
  const art=getCurrentArticle();
  document.getElementById('currentTitle').textContent=art?art.title:'案件を選択';
}
function renderEditor(){
  const art=getCurrentArticle();
  document.getElementById('editor').value=art?art.text:'';
  updateFooter();
}
function updateFooter(){
  const art=getCurrentArticle();if(!art)return;
  const text=art.text||'';
  const paras=getParas(text);
  document.getElementById('charCount').textContent=text.length+' 文字';
  document.getElementById('paraCount').textContent=paras.length+' 段落';
  if(activePara){
    const p=paras.find(p=>p.num===activePara);
    document.getElementById('activeParaInfo').textContent=p?`段落${activePara}を選択中: 「${p.text.slice(0,24)}${p.text.length>24?'…':''}」`:'';
  } else {
    document.getElementById('activeParaInfo').textContent='';
  }
}

function getParaAtCursor(){
  const ta=document.getElementById('editor');
  const pos=ta.selectionStart;
  const lines=ta.value.substring(0,pos).split('\n');
  const lineIdx=lines.length-1;
  const paras=getParas(ta.value);
  // find which para this line belongs to
  for(let i=paras.length-1;i>=0;i--){
    if(paras[i].lineIdx<=lineIdx)return paras[i].num;
  }
  return null;
}

const editor=document.getElementById('editor');
editor.addEventListener('input',autoSave);
editor.addEventListener('click',()=>{
  const p=getParaAtCursor();
  if(p!==activePara){activePara=p;updateFooter();renderSources();}
});
editor.addEventListener('keyup',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Home','End'].includes(e.key)){
    const p=getParaAtCursor();
    if(p!==activePara){activePara=p;updateFooter();renderSources();}
  }
});

// ── source pane ──
function renderSources(){
  const art=getCurrentArticle();
  const body=document.getElementById('sourceBody');
  if(!art){body.innerHTML='<div class="source-empty">案件を選択してください</div>';return;}

  const pending=window._pendingClips&&window._pendingClips.length;
  let html='';

  if(pending){
    html+=`<div class="pending-banner">
      <p><i class="ti ti-clipboard-check"></i> <strong>${window._pendingClips.length}件</strong> 届いています</p>
      <button onclick="importPending()">取り込む</button>
    </div>`;
  }

  if(!art.sources.length&&!pending){
    html+='<div class="source-empty"><i class="ti ti-link-off" style="font-size:24px;display:block;margin-bottom:8px"></i>引用元がまだありません<br><span style="font-size:11px">上の「追加」から登録できます</span></div>';
    body.innerHTML=html;return;
  }

  html+=art.sources.map(s=>{
    const isHighlighted=activePara&&s.paraNum===activePara;
    const badgeHtml=s.paraNum
      ?`<span class="sc-para-badge linked" onclick="openParaPicker(event,'${s.id}')"><i class="ti ti-link" style="font-size:9px"></i>段落${s.paraNum}</span>`
      :`<span class="sc-para-badge unlinked" onclick="openParaPicker(event,'${s.id}')"><i class="ti ti-link-off" style="font-size:9px"></i>段落を紐付け</span>`;
    return `<div class="sc${isHighlighted?' highlighted':''}" id="sc_${s.id}">
      <div class="sc-top">
        <div style="flex:1;min-width:0;display:flex;align-items:center;flex-wrap:wrap;gap:3px">
          <span class="stag ${tagClass(s.type)}">${esc(s.type)}</span>
          ${badgeHtml}
          ${s.note?`<span class="sc-note">${esc(s.note)}</span>`:''}
        </div>
        <button class="sbtn del" onclick="deleteSource(event,'${s.id}')"><i class="ti ti-trash" style="font-size:11px"></i></button>
      </div>
      ${s.quote?`<div class="sc-quote">${esc(s.quote.length>120?s.quote.slice(0,120)+'…':s.quote)}</div>`:''}
      ${s.translation?`<div class="sc-trans">和訳: ${esc(s.translation)}</div>`:''}
      <div class="sc-url"><a href="${esc(s.url)}" target="_blank">${esc(s.url)}</a></div>
      <div class="sc-actions">
        <button class="sbtn" onclick="copyQuote('${s.id}')"><i class="ti ti-copy" style="font-size:11px"></i>原文コピー</button>
        <button class="sbtn" onclick="openAddSourceModal('${s.id}')"><i class="ti ti-edit" style="font-size:11px"></i>編集</button>
        ${s.quote&&s.translation?`<button class="sbtn" onclick="verifyOne('${s.id}')"><i class="ti ti-check" style="font-size:11px"></i>訳を検証</button>`:''}
      </div>
      <div id="vr_${s.id}"></div>
    </div>`;
  }).join('');
  body.innerHTML=html;

  if(activePara){
    const first=body.querySelector('.sc.highlighted');
    if(first)first.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}

// ── para picker ──
function openParaPicker(e,sourceId){
  e.stopPropagation();
  const art=getCurrentArticle();if(!art)return;
  pickerSourceId=sourceId;
  const paras=getParas(art.text);
  const s=art.sources.find(x=>x.id===sourceId);
  const picker=document.getElementById('paraPicker');

  let html=`<div class="para-picker-head">どの段落に紐付けますか？</div>`;
  if(!paras.length){
    html+='<div style="padding:10px 12px;font-size:12px;color:var(--tx3)">原稿に段落がありません</div>';
  } else {
    html+=paras.map(p=>`
      <div class="para-picker-item${s&&s.paraNum===p.num?' active':''}" onclick="linkToPara(${p.num})">
        <div class="para-num">段落 ${p.num}</div>
        <div>${esc(p.text.slice(0,48))}${p.text.length>48?'…':''}</div>
      </div>`).join('');
  }
  if(s&&s.paraNum){
    html+=`<div class="para-picker-unlink" onclick="linkToPara(null)"><i class="ti ti-link-off" style="font-size:12px"></i>紐付けを解除</div>`;
  }
  picker.innerHTML=html;

  // position near the badge
  const rect=e.target.getBoundingClientRect();
  picker.style.display='block';
  let top=rect.bottom+6;
  let left=rect.left;
  // keep within viewport
  if(left+260>window.innerWidth)left=window.innerWidth-268;
  if(top+280>window.innerHeight)top=rect.top-286;
  picker.style.top=top+'px';
  picker.style.left=left+'px';
}

function linkToPara(num){
  const art=getCurrentArticle();if(!art||!pickerSourceId)return;
  const s=art.sources.find(x=>x.id===pickerSourceId);
  if(s)s.paraNum=num||null;
  save(true);
  closePicker();
  renderSources();
}

function closePicker(){
  document.getElementById('paraPicker').style.display='none';
  pickerSourceId=null;
}

document.addEventListener('click',e=>{
  const picker=document.getElementById('paraPicker');
  if(picker.style.display!=='none'&&!picker.contains(e.target))closePicker();
});

// ── add/edit source ──
let editingSourceId=null;
function openAddSourceModal(sourceId){
  editingSourceId=sourceId;
  const art=getCurrentArticle();
  if(sourceId){
    const s=art.sources.find(x=>x.id===sourceId);if(!s)return;
    document.getElementById('addSourceTitle').textContent='引用元を編集';
    document.getElementById('nUrl').value=s.url||'';
    document.getElementById('nType').value=s.type||'その他';
    document.getElementById('nQuote').value=s.quote||'';
    document.getElementById('nTrans').value=s.translation||'';
    document.getElementById('nNote').value=s.note||'';
  } else {
    document.getElementById('addSourceTitle').textContent='引用元を追加';
    ['nUrl','nQuote','nTrans','nNote'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('nType').value='その他';
  }
  document.getElementById('addSourceModal').classList.remove('hidden');
}

function addSource(){
  const art=getCurrentArticle();if(!art)return;
  const url=document.getElementById('nUrl').value.trim();
  const quote=document.getElementById('nQuote').value.trim();
  if(!url&&!quote){alert('URLか引用テキストを入力してください');return;}
  const src={
    id:editingSourceId||uid(),
    url,quote,
    translation:document.getElementById('nTrans').value.trim(),
    type:document.getElementById('nType').value,
    note:document.getElementById('nNote').value.trim(),
    paraNum:editingSourceId?art.sources.find(s=>s.id===editingSourceId)?.paraNum||null:activePara||null
  };
  if(editingSourceId){
    const idx=art.sources.findIndex(s=>s.id===editingSourceId);
    if(idx>=0)art.sources[idx]=src;
  } else {
    art.sources.push(src);
  }
  save(true);renderSources();closeModal('addSourceModal');
}

function deleteSource(e,id){
  e.stopPropagation();
  const art=getCurrentArticle();if(!art)return;
  if(!confirm('削除しますか？'))return;
  art.sources=art.sources.filter(s=>s.id!==id);
  save(true);renderSources();
}

function copyQuote(id){
  const art=getCurrentArticle();if(!art)return;
  const s=art.sources.find(x=>x.id===id);if(!s)return;
  navigator.clipboard.writeText(s.quote||s.url).catch(()=>{});
  const btn=document.querySelector(`#sc_${id} .sbtn`);
  if(btn){const o=btn.innerHTML;btn.innerHTML='<i class="ti ti-check" style="font-size:11px"></i>コピー完了';setTimeout(()=>btn.innerHTML=o,1500);}
}

// ── article modal ──
function openArticleModal(){renderArtListModal();document.getElementById('articleModal').classList.remove('hidden');}
function renderArtListModal(){
  const el=document.getElementById('artListModal');
  if(!state.articles.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--tx3);font-size:13px">案件がありません</div>';return;}
  el.innerHTML=state.articles.map(a=>`
    <div class="ali${a.id===state.currentId?' active':''}" onclick="selectArticle('${a.id}')">
      <div>
        <div class="ali-title">${esc(a.title)}</div>
        <div class="ali-meta">${a.createdAt} · 引用${a.sources.length}件 · ${(a.text||'').length}文字</div>
      </div>
      <div style="display:flex;gap:4px">
        <button class="sbtn" onclick="renameArticle('${a.id}',event)"><i class="ti ti-pencil" style="font-size:11px"></i></button>
        <button class="sbtn del" onclick="deleteArticle('${a.id}',event)"><i class="ti ti-trash" style="font-size:11px"></i></button>
      </div>
    </div>`).join('');
}

// ── verify ──
async function verifyOne(id){
  const art=getCurrentArticle();if(!art)return;
  const s=art.sources.find(x=>x.id===id);if(!s)return;
  const el=document.getElementById(`vr_${id}`);
  if(el)el.innerHTML='<div class="sc-verify-result"><span class="spinner"></span> 検証中...</div>';
  const r=await callVerifyAPI(s.quote,s.translation);
  if(el)el.innerHTML=`<div class="sc-verify-result">
    <span class="vstatus ${r.status==='ok'?'s-ok':'s-warn'}">${r.status==='ok'?'✓ 問題なし':'⚠ 要確認'}</span>
    <div style="margin-top:4px">${esc(r.accuracy)}</div>
    ${r.issues?`<div style="margin-top:3px;color:var(--atx)">${esc(r.issues)}</div>`:''}
    ${r.suggestion?`<div style="margin-top:3px"><b>修正案:</b> ${esc(r.suggestion)}</div>`:''}
  </div>`;
}

function openVerifyModal(){
  const art=getCurrentArticle();if(!art)return;
  const srcs=art.sources.filter(s=>s.quote&&s.translation);
  const body=document.getElementById('verifyBody');
  if(!srcs.length){
    body.innerHTML='<div style="padding:20px;text-align:center;color:var(--tx3);font-size:13px">原文と和訳が両方入力された引用元がありません</div>';
    document.getElementById('runVerifyBtn').style.display='none';
  } else {
    document.getElementById('runVerifyBtn').style.display='';
    body.innerHTML=srcs.map(s=>`
      <div style="background:var(--bg2);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;border:0.5px solid var(--bd)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
          <div><span class="stag ${tagClass(s.type)}">${esc(s.type)}</span>${s.note?`<span style="font-size:11px;color:var(--tx2);margin-left:5px">${esc(s.note)}</span>`:''}</div>
          <span class="vstatus s-pend" id="mvs_${s.id}">未検証</span>
        </div>
        <div style="font-size:11px;font-style:italic;color:var(--tx2)">"${esc(s.quote.slice(0,90))}${s.quote.length>90?'...':''}"</div>
        <div style="font-size:11px;margin-top:3px">和訳: ${esc(s.translation)}</div>
        <div id="mvr_${s.id}"></div>
      </div>`).join('');
  }
  document.getElementById('verifyModal').classList.remove('hidden');
}

async function runVerifyAll(){
  const art=getCurrentArticle();if(!art)return;
  const srcs=art.sources.filter(s=>s.quote&&s.translation);
  const btn=document.getElementById('runVerifyBtn');btn.disabled=true;
  for(const s of srcs){
    const se=document.getElementById(`mvs_${s.id}`);
    const re=document.getElementById(`mvr_${s.id}`);
    if(se)se.innerHTML='<span class="spinner"></span>';
    const r=await callVerifyAPI(s.quote,s.translation);
    if(se){se.className=`vstatus ${r.status==='ok'?'s-ok':'s-warn'}`;se.textContent=r.status==='ok'?'✓ 問題なし':'⚠ 要確認';}
    if(re)re.innerHTML=`<div style="font-size:11px;margin-top:5px;padding:5px 7px;background:var(--bg);border-radius:var(--r)">
      ${esc(r.accuracy)}${r.issues?`<br><span style="color:var(--atx)">${esc(r.issues)}</span>`:''}
      ${r.suggestion?`<br><b>修正案:</b> ${esc(r.suggestion)}`:''}
    </div>`;
  }
  btn.disabled=false;
}

async function callVerifyAPI(quote,translation){
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,
        messages:[{role:'user',content:`海外特派員の引用翻訳チェッカー。JSONのみ返答（backtick不要）。\n原文: ${quote}\n和訳: ${translation}\n{"status":"ok"or"warn","issues":"問題点(okなら空)","suggestion":"修正案(okなら空)","accuracy":"精度の一言評価"}`}]})
    });
    const data=await resp.json();
    const text=(data.content||[]).map(i=>i.text||'').join('');
    return JSON.parse(text.replace(/```json|```/g,'').trim());
  }catch(e){return{status:'warn',issues:'APIエラー',suggestion:'',accuracy:''};}
}

// ── pending clips ──
function checkPending(){
  try{
    const raw=localStorage.getItem('reporter_pending_clips');
    if(!raw)return;
    window._pendingClips=JSON.parse(raw);
    localStorage.removeItem('reporter_pending_clips');
    renderSources();
  }catch(e){}
}
function importPending(){
  const art=getCurrentArticle();if(!art)return;
  (window._pendingClips||[]).forEach(c=>{
    art.sources.push({id:uid(),url:c.url||'',quote:c.quote||'',translation:'',type:c.sourceType||'その他',note:c.title||'',paraNum:activePara||null});
  });
  window._pendingClips=null;
  save(true);renderSources();
}
window.addEventListener('storage',e=>{
  if(e.key==='reporter_pending_clips'&&e.newValue){
    try{window._pendingClips=JSON.parse(e.newValue);localStorage.removeItem('reporter_pending_clips');renderSources();}catch(err){}
  }
});

function closeModal(id){document.getElementById(id).classList.add('hidden');}
document.querySelectorAll('.modal-bg').forEach(bg=>{
  bg.addEventListener('click',function(e){if(e.target===this)this.classList.add('hidden');});
});
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();saveArticle();}
  if(e.key==='Escape')closePicker();
});

load();
</script>
