<!DOCTYPE html>
<html lang="ja">
<head><!-- add stock modal -->
<div class="modal-bg hidden" id="addStockModal">
  <div class="modal" style="width:500px">
    <h2><i class="ti ti-bookmarks"></i> ストックに保存</h2>
    <div class="fl"><label class="flabel">URL</label><input class="fi" id="sUrl" placeholder="https://..."></div>
    <div class="fl"><label class="flabel">引用テキスト</label><textarea class="fi" id="sQuote" placeholder="気になった部分をペースト"></textarea></div>
    <div class="fl"><label class="flabel">メモ・タイトル</label><input class="fi" id="sNote" placeholder="何についての記事か、一言メモ"></div>
    <div class="fl">
      <label class="flabel">テーマタグ（カンマ区切り）</label>
      <input class="fi" id="sTags" placeholder="例: イスラエル, 停戦交渉, ネタニヤフ" oninput="showTagSuggestions()">
      <div id="tagSuggestions" style="display:none;margin-top:4px;display:flex;flex-wrap:wrap;gap:4px"></div>
      <div style="margin-top:5px" id="existingTagsHint"></div>
    </div>
    <div class="modal-footer">
      <button class="mbtn" onclick="closeModal('addStockModal')">キャンセル</button>
      <button class="mbtn primary" onclick="saveStock()"><i class="ti ti-check"></i> 保存</button>
    </div>
  </div>
</div>

<script>
(function(){
  var PASS_KEY = "reporter_auth_v1";
  var CORRECT = "press2025";
  if(sessionStorage.getItem(PASS_KEY) === "ok") return;
  document.documentElement.style.visibility = "hidden";
  var entered = prompt("パスワードを入力してください:");
  if(entered === CORRECT){
    sessionStorage.setItem(PASS_KEY, "ok");
    document.documentElement.style.visibility = "";
  } else {
    document.documentElement.style.visibility = "";
    document.open();
    document.write('<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,sans-serif;color:#888;font-size:14px">アクセスが拒否されました</div>');
    document.close();
  }
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記者原稿ツール</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#eeede8;
  --tx:#1a1a1a;--tx2:#666;--tx3:#aaa;
  --bd:rgba(0,0,0,0.08);--bd2:rgba(0,0,0,0.15);--bd3:rgba(0,0,0,0.28);
  --green:#1D9E75;--gbg:#E1F5EE;--gtx:#085041;
  --blue:#185FA5;--bbg:#E6F1FB;--btx:#0C447C;
  --abg:#FAEEDA;--atx:#633806;
  --pbg:#EEEDFE;--ptx:#3C3489;
  --r:8px;--rl:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --sidebar:200px;--sources:400px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1e1e1e;--bg2:#262626;--bg3:#2a2a2a;--tx:#e8e8e8;--tx2:#aaa;--tx3:#555;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);--bd3:rgba(255,255,255,0.25)}
}
html,body{height:100%;font-family:var(--font);background:var(--bg3);color:var(--tx);overflow:hidden}
.shell{display:flex;height:100vh;flex-direction:column}

/* topbar */
.topbar{height:44px;background:var(--bg);border-bottom:0.5px solid var(--bd);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.topbar-title{font-size:13px;font-weight:600;color:var(--tx2);letter-spacing:0.02em;margin-right:4px}
.topbar-sep{width:0.5px;height:18px;background:var(--bd2);flex-shrink:0}
.tbtn{padding:5px 11px;border-radius:var(--r);border:0.5px solid var(--bd2);background:transparent;cursor:pointer;font-size:12px;color:var(--tx2);font-family:var(--font);display:flex;align-items:center;gap:4px;white-space:nowrap}
.tbtn:hover{background:var(--bg2);color:var(--tx)}
.tbtn.primary{background:var(--green);color:#fff;border-color:var(--green)}
.tbtn.primary:hover{opacity:0.88}
.save-status{font-size:11px;color:var(--green);min-width:56px;font-weight:500}

.workspace{display:flex;flex:1;overflow:hidden}

/* ── sidebar ── */
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:0.5px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;min-height:0}
.sidebar-head{padding:10px 12px 6px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.sidebar-head span{font-size:11px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:0.05em}
.new-art-btn{font-size:11px;padding:2px 8px;border-radius:var(--r);border:0.5px solid var(--bd2);background:transparent;cursor:pointer;color:var(--tx2);font-family:var(--font);display:flex;align-items:center;gap:3px}
.new-art-btn:hover{background:var(--green);color:#fff;border-color:var(--green)}
.art-list{flex:1;overflow-y:auto;padding:6px;min-height:0}
.art-item{padding:7px 9px;border-radius:var(--r);cursor:pointer;margin-bottom:2px;border:0.5px solid transparent;position:relative}
.art-item:hover{background:var(--bg);border-color:var(--bd)}
.art-item.active{background:var(--bg);border-color:var(--green);border-width:1.5px}
.art-item-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:16px}
.art-item.active .art-item-title{color:var(--green)}
.art-item-meta{font-size:10px;color:var(--tx3);margin-top:1px}
.art-item-del{position:absolute;top:6px;right:6px;background:transparent;border:none;cursor:pointer;color:var(--tx3);padding:1px;display:none;font-size:12px}
.art-item:hover .art-item-del{display:block}
.art-item-del:hover{color:#E24B4A}
.status-badge{font-size:9px;padding:1px 6px;border-radius:99px;cursor:pointer;font-weight:600;flex-shrink:0;white-space:nowrap}
.status-writing{background:var(--bbg);color:var(--btx)}
.status-review{background:var(--abg);color:var(--atx)}
.status-done{background:var(--gbg);color:var(--gtx)}
.status-hold{background:var(--bg3);color:var(--tx3);border:0.5px solid var(--bd2)}
.sidebar-stock-head{padding:8px 12px;border-top:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:11px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:0.05em;flex-shrink:0}
.sidebar-stock-head:hover{background:var(--bg)}
.stock-item{padding:7px 9px;border-radius:var(--r);margin-bottom:3px;border:0.5px solid var(--bd);background:var(--bg);font-size:11px}
.stock-item-title{color:var(--tx);line-height:1.4;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stock-item-url{color:var(--tx3);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stock-tag-btn{font-size:10px;padding:2px 8px;border-radius:99px;border:0.5px solid var(--bd2);background:transparent;cursor:pointer;color:var(--tx2);font-family:var(--font)}
.stock-tag-btn:hover,.stock-tag-btn.active{background:var(--bbg);color:var(--btx);border-color:#B5D4F4}

/* ── editor ── */
.editor-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

.editor-textarea{height:100%;min-height:400px;border:none;outline:none;resize:none;font-size:15px;line-height:2;color:var(--tx);background:transparent;font-family:'Georgia',serif;caret-color:var(--green);flex-shrink:0;padding:0 4px}
.editor-textarea::placeholder{color:var(--tx3);font-family:var(--font);font-size:14px}
.editor-wrap{flex:1;overflow:auto;padding:36px 32px}
#editorWrap{position:relative}
#colEditor textarea{border:none;outline:none;resize:none;background:transparent;font-family:Georgia,serif;font-size:15px;line-height:2;color:var(--tx);caret-color:var(--green);padding:0;width:100%;overflow:hidden}
.editor-footer{padding:5px 48px;border-top:0.5px solid var(--bd);font-size:11px;color:var(--tx3);display:flex;gap:16px;flex-shrink:0;background:var(--bg)}

/* ── source pane ── */
.source-pane{width:var(--sources);border-left:0.5px solid var(--bd);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0;overflow:hidden}
.source-head{padding:9px 14px 7px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.source-head-title{font-size:12px;font-weight:500;color:var(--tx2)}
.source-add-btn{font-size:11px;padding:3px 9px;border-radius:var(--r);border:0.5px solid var(--bd2);background:var(--bg);cursor:pointer;color:var(--tx2);display:flex;align-items:center;gap:4px;font-family:var(--font)}
.source-add-btn:hover{background:var(--green);color:#fff;border-color:var(--green)}
.source-body{flex:1;overflow-y:auto;padding:10px 12px}
.source-empty{text-align:center;padding:40px 16px;color:var(--tx3);font-size:12px;line-height:1.9}

/* source cards */
.sc{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;transition:border-color 0.12s,box-shadow 0.12s}
.sc:hover{border-color:var(--bd2)}
.sc.highlighted{border:2.5px solid var(--green);box-shadow:0 0 0 3px rgba(29,158,117,0.18);background:#fafffd}
@media(prefers-color-scheme:dark){.sc.highlighted{background:#1a2e26}}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px}
.stag{font-size:10px;padding:2px 7px;border-radius:var(--r);font-weight:500;display:inline-block}
.t-sns{background:var(--bbg);color:var(--btx)}.t-un{background:var(--gbg);color:var(--gtx)}
.t-research{background:var(--abg);color:var(--atx)}.t-media{background:var(--pbg);color:var(--ptx)}
.t-other{background:var(--bg2);color:var(--tx2)}
.t-interview{background:#F0EDF8;color:#4A3880}
.sc-note{font-size:11px;color:var(--tx2);margin-left:4px}
.sc-para-badge{font-size:10px;padding:2px 7px;border-radius:var(--r);font-weight:500;margin-left:4px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;transition:opacity 0.1s}
.sc-para-badge.linked{background:var(--gbg);color:var(--gtx);border:1px solid #9FE1CB}
.sc-para-badge.unlinked{background:var(--bg2);color:var(--tx3);border:0.5px dashed var(--bd2)}
.sc-para-badge:hover{opacity:0.72}
.sc-quote{font-size:12px;font-style:italic;border-left:2.5px solid var(--bd2);padding-left:8px;margin:6px 0;line-height:1.55;color:var(--tx)}
.sc.highlighted .sc-quote{border-left-color:var(--green)}
.sc-trans{font-size:11px;color:var(--tx2);line-height:1.5;margin:3px 0}
.sc-url{font-size:10px;color:var(--tx3);word-break:break-all;margin-top:3px}
.sc-url a{color:var(--blue);text-decoration:none}
.sc-url a:hover{text-decoration:underline}
.sc-actions{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.sbtn{font-size:11px;padding:3px 8px;border:0.5px solid var(--bd);border-radius:var(--r);background:transparent;cursor:pointer;color:var(--tx2);display:flex;align-items:center;gap:3px;font-family:var(--font)}
.sbtn:hover{background:var(--bg2);color:var(--tx)}
.sbtn.del:hover{color:#E24B4A;border-color:#F7C1C1;background:#FCEBEB}
.sbtn.verify-btn{color:var(--blue);border-color:#B5D4F4}
.sbtn.verify-btn:hover{background:var(--bbg)}
.sc-verify-result{font-size:11px;margin-top:7px;padding:7px 9px;background:var(--bg2);border-radius:var(--r);line-height:1.6}
.vstatus{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border-radius:var(--r);font-weight:500}
.s-ok{background:var(--gbg);color:var(--gtx)}.s-warn{background:var(--abg);color:var(--atx)}.s-pend{background:var(--bg2);color:var(--tx2)}
.spinner{display:inline-block;width:10px;height:10px;border:2px solid var(--bd2);border-top-color:var(--tx2);border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* pending banner */
.pending-banner{background:var(--gbg);border:0.5px solid #9FE1CB;border-radius:var(--r);padding:9px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.pending-banner p{font-size:12px;color:var(--gtx)}
.pending-banner button{font-size:11px;padding:3px 10px;background:var(--green);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-family:var(--font)}

/* para picker */
.para-picker{position:fixed;z-index:300;background:var(--bg);border:0.5px solid var(--bd2);border-radius:var(--r);box-shadow:0 4px 20px rgba(0,0,0,0.14);width:260px;max-height:300px;overflow-y:auto}
.para-picker-head{padding:8px 12px;border-bottom:0.5px solid var(--bd);font-size:11px;font-weight:500;color:var(--tx2);background:var(--bg2)}
.para-picker-item{padding:8px 12px;cursor:pointer;font-size:12px;color:var(--tx);line-height:1.4;border-bottom:0.5px solid var(--bd)}
.para-picker-item:hover{background:var(--gbg);color:var(--gtx)}
.para-picker-item.active{background:var(--gbg);color:var(--gtx)}
.para-picker-item .pnum{font-size:10px;font-weight:600;color:var(--tx3);margin-bottom:2px}
.para-picker-unlink{padding:8px 12px;cursor:pointer;font-size:12px;color:var(--tx3);display:flex;align-items:center;gap:5px;border-top:0.5px solid var(--bd)}
.para-picker-unlink:hover{background:var(--bg2);color:var(--tx)}

/* src tabs */
.src-tab{padding:7px 16px;border:none;background:transparent;cursor:pointer;font-size:12px;color:var(--tx2);font-family:var(--font);border-bottom:2px solid transparent;margin-bottom:-0.5px;display:flex;align-items:center;gap:5px}
.src-tab:hover{color:var(--tx)}
.src-tab.active{color:var(--green);border-bottom-color:var(--green);font-weight:500}

/* modals */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.32);z-index:200;display:flex;align-items:center;justify-content:center}
.modal-bg.hidden{display:none}
.modal{background:var(--bg);border-radius:var(--rl);padding:24px;width:560px;max-width:94vw;max-height:88vh;overflow-y:auto;border:0.5px solid var(--bd2)}
.modal h2{font-size:15px;font-weight:500;margin-bottom:16px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.mbtn{padding:7px 16px;border-radius:var(--r);border:0.5px solid var(--bd2);background:transparent;cursor:pointer;font-size:13px;font-family:var(--font);color:var(--tx)}
.mbtn:hover{background:var(--bg2)}
.mbtn.primary{background:var(--green);color:#fff;border-color:var(--green)}
.mbtn.primary:hover{opacity:0.88}
.fl{margin-bottom:10px}
.flabel{font-size:10px;color:var(--tx2);font-weight:500;text-transform:uppercase;letter-spacing:0.04em;display:block;margin-bottom:3px}
.fi{width:100%;padding:7px 10px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);font-size:13px;outline:none;font-family:var(--font)}
.fi:focus{border-color:var(--bd3)}
textarea.fi{resize:vertical;min-height:56px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* verify modal */
.vc{background:var(--bg2);border-radius:var(--r);padding:11px 13px;margin-bottom:10px;border:0.5px solid var(--bd)}
.vc.ok{border-color:#9FE1CB}.vc.warn{border-color:#FAC775}
</style>
</head>
<body>
<div class="shell">
  <!-- topbar -->
  <div class="topbar">
    <span class="topbar-title">記者原稿</span>
    <div class="topbar-sep"></div>
    <button class="tbtn primary" onclick="saveArticle()"><i class="ti ti-device-floppy"></i> 保存</button>
    <span class="save-status" id="saveStatus"></span>
    <div id="readonlyLabel" style="display:none;align-items:center;gap:6px;padding:4px 12px;background:var(--bbg);border-radius:var(--r);border:0.5px solid #B5D4F4;font-size:12px;font-weight:500;color:var(--btx)">
      <i class="ti ti-eye" style="font-size:13px"></i> 閲覧モード（編集するにはスライダーを25字以上に）
    </div>
    <div style="flex:1"></div>
    <button class="tbtn" onclick="openAddSourceModal(null)"><i class="ti ti-plus"></i> 引用元を追加</button>
    <button class="tbtn" id="stockPaneBtn" onclick="toggleStockPane()"><i class="ti ti-bookmarks"></i> ストック<span id="stockCount" style="margin-left:4px;background:var(--bbg);color:var(--btx);font-size:10px;padding:1px 6px;border-radius:99px;font-weight:600"></span></button>
    <button class="tbtn" onclick="copyAllForVerify()"><i class="ti ti-clipboard-copy"></i> 検証用コピー</button>
  </div>

  <div class="workspace">
    <!-- sidebar: article list -->
    <div class="sidebar">
      <div class="sidebar-head">
        <span id="sidebarHeadLabel">案件</span>
        <div style="display:flex;gap:4px">
          <button class="new-art-btn" id="trashToggleBtn" onclick="toggleTrash()" title="ゴミ箱"><i class="ti ti-trash"></i></button>
          <button class="new-art-btn" id="newArtBtn" onclick="newArticle()"><i class="ti ti-plus"></i>新規</button>
        </div>
      </div>
      <div style="flex:1;overflow-y:auto;min-height:0">
        <div class="art-list" id="artList"></div>
      </div>
    </div>

    <!-- editor -->
    <div class="editor-pane">
      <div class="editor-wrap" id="editorWrap" style="position:relative">
        <textarea class="editor-textarea" id="editor" placeholder="原稿をここに入力..."></textarea>
        <div id="colEditor" style="display:none;width:100%;height:100%;position:absolute;top:0;left:0;overflow:auto;padding:36px 32px;gap:32px;align-items:flex-start;outline:none" onclick="colEditorClick(event)"></div>
      </div>
      <div class="editor-footer">
        <div style="display:flex;align-items:center;gap:10px;flex:1">
          <i class="ti ti-columns" style="font-size:13px;color:var(--tx3)" aria-hidden="true"></i>
          <input type="range" id="colWidthSlider" min="8" max="48" value="48" step="1"
            style="width:120px" oninput="updateColWidth(this.value)">
          <span id="colWidthLabel" style="font-size:11px;color:var(--tx2);min-width:36px">48字</span>
        </div>
        <div style="display:flex;gap:16px;align-items:center">
          <span id="charCount" style="font-size:16px;font-weight:600;color:var(--tx)">0 文字</span>
          <span id="lineCount" style="font-size:16px;font-weight:600;color:var(--tx)">0 行</span>
          <span id="paraCount" style="font-size:16px;font-weight:600;color:var(--tx)">0 段落</span>
          <span id="activeParaInfo" style="font-size:11px;color:var(--green);font-weight:500"></span>
        </div>
      </div>
    </div>

    <!-- stock pane -->
    <div id="stockPane" style="display:none;width:320px;border-left:0.5px solid var(--bd);display:none;flex-direction:column;background:var(--bg2);flex-shrink:0;overflow:hidden">
      <div style="padding:9px 14px 0;border-bottom:0.5px solid var(--bd);flex-shrink:0">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:12px;font-weight:500;color:var(--tx2)">ストック・引用元一覧</span>
          <button class="sbtn" onclick="toggleStockPane()"><i class="ti ti-x" style="font-size:12px"></i></button>
        </div>
        <div style="display:flex;gap:0">
          <div id="stab-all" class="src-tab active" style="cursor:pointer" onclick="switchStockTab('all')"><i class="ti ti-database" style="font-size:12px"></i> 全て</div>
          <div id="stab-unused" class="src-tab" style="cursor:pointer" onclick="switchStockTab('unused')"><i class="ti ti-bookmark" style="font-size:12px"></i> 未使用</div>
        </div>
      </div>
      <div style="padding:6px 10px;border-bottom:0.5px solid var(--bd);flex-shrink:0;display:flex;gap:4px;flex-wrap:wrap;align-items:center">
        <span style="font-size:10px;color:var(--tx3)">タグ:</span>
        <div id="stockTagBar" style="display:flex;gap:3px;flex-wrap:wrap;flex:1"></div>
        <button class="source-add-btn" onclick="openAddStockModal()"><i class="ti ti-plus" style="font-size:11px"></i>追加</button>
      </div>
      <div id="stockBody" style="flex:1;overflow-y:auto;padding:10px 12px"></div>
    </div>

    <!-- source pane -->
    <div class="source-pane">
      <div class="source-head">
        <span class="source-head-title" id="sourceHeadTitle">引用元一覧</span>
        <button class="source-add-btn" onclick="openAddSourceModal(null)"><i class="ti ti-plus" style="font-size:12px"></i>追加</button>
      </div>
      <div class="source-body" id="sourceBody"></div>
    </div>
  </div>
</div>

<!-- para picker -->
<div id="paraPicker" class="para-picker" style="display:none"></div>

<!-- add/edit source modal -->
<div class="modal-bg hidden" id="addSourceModal">
  <div class="modal" style="width:600px">
    <h2 id="addSourceTitle">引用元を追加</h2>
    <div style="display:flex;gap:0;border-bottom:0.5px solid var(--bd2);margin-bottom:16px">
      <div id="tab-web" class="src-tab active" style="cursor:pointer" onclick="switchSrcTab('web')">
        <i class="ti ti-link"></i> ウェブ・SNS
      </div>
      <div id="tab-interview" class="src-tab" style="cursor:pointer" onclick="switchSrcTab('interview')">
        <i class="ti ti-microphone"></i> インタビュー・独自メモ
      </div>
    </div>

    <!-- web tab -->
    <div id="srcForm-web">
      <div class="row2 fl">
        <div><label class="flabel">URL</label><input class="fi" id="nUrl" placeholder="https://..."></div>
        <div><label class="flabel">種別</label>
          <select class="fi" id="nType"><option>SNS/X</option><option>国連・公式</option><option>研究機関</option><option>メディア</option><option>その他</option></select>
        </div>
      </div>
      <div class="fl"><label class="flabel">引用テキスト（原文）</label><textarea class="fi" id="nQuote" placeholder="引用したい原文をペースト"></textarea></div>
      <div class="fl"><label class="flabel">和訳メモ（任意）</label><textarea class="fi" id="nTrans" placeholder="自分の訳をメモ" style="min-height:44px"></textarea></div>
      <div class="fl"><label class="flabel">備考</label><input class="fi" id="nNote" placeholder="誰の発言か、文脈など"></div>
    </div>

    <!-- interview tab -->
    <div id="srcForm-interview" style="display:none">
      <div class="row2 fl">
        <div><label class="flabel">発言者・情報源</label><input class="fi" id="iWho" placeholder="例: 山田太郎・外務省高官"></div>
        <div><label class="flabel">日時</label><input class="fi" id="iDate" placeholder="例: 2025年5月20日 14:30"></div>
      </div>
      <div class="row2 fl">
        <div><label class="flabel">場所・手段</label><input class="fi" id="iPlace" placeholder="例: 東京・電話取材・メール"></div>
        <div><label class="flabel">ファイル名（任意）</label><input class="fi" id="iFile" placeholder="例: interview_yamada_0520.docx"></div>
      </div>
      <div class="fl"><label class="flabel">発言・メモ内容</label><textarea class="fi" id="iQuote" placeholder="発言内容やメモをここに入力" style="min-height:100px"></textarea></div>
      <div class="fl"><label class="flabel">補足・文脈</label><textarea class="fi" id="iNote" placeholder="取材の背景、オフレコ扱いなど" style="min-height:48px"></textarea></div>
      <div style="background:var(--abg);border-radius:var(--r);padding:8px 12px;font-size:11px;color:var(--atx);margin-bottom:10px">
        <i class="ti ti-lock" style="font-size:11px"></i> このデータはブラウザのみに保存されます。外部に送信されません。
      </div>
    </div>

    <div class="modal-footer">
      <button class="mbtn" onclick="closeModal('addSourceModal')">キャンセル</button>
      <button class="mbtn primary" onclick="addSource()"><i class="ti ti-check"></i> 保存</button>
    </div>
  </div>
</div>

    <div class="modal-footer">
      <button class="mbtn" onclick="closeModal('verifyModal')">閉じる</button>
      <button class="mbtn primary" id="runVerifyBtn" onclick="runVerifyAll()"><i class="ti ti-robot"></i> 全件検証開始</button>
    </div>
  </div>
</div>

<script>
const SK='reporter_v5';
let state={articles:[],currentId:null};
let activePara=null;
let pickerSourceId=null;

// ── stock pane ──
let stockTagFilter = null;
let stockTab = 'all'; // 'all' or 'unused'
let stockPaneVisible = false;

function toggleStockPane(){
  stockPaneVisible = !stockPaneVisible;
  const pane = document.getElementById('stockPane');
  const btn = document.getElementById('stockPaneBtn');
  pane.style.display = stockPaneVisible ? 'flex' : 'none';
  pane.style.flexDirection = stockPaneVisible ? 'column' : '';
  if(btn) btn.classList.toggle('active', stockPaneVisible);
  if(stockPaneVisible) renderStockPane();
}

function switchStockTab(tab){
  stockTab = tab;
  document.getElementById('stab-all').classList.toggle('active', tab==='all');
  document.getElementById('stab-unused').classList.toggle('active', tab==='unused');
  renderStockPane();
}

function renderStockPane(){
  if(!stockPaneVisible) return;
  const stocks = state.stocks || [];

  // Build unified list: stock items + all article sources
  let allItems = [];

  // Stock items (unattached)
  stocks.forEach(s=>{
    allItems.push({...s, _kind:'stock', _artTitle:null});
  });

  // Article sources
  if(stockTab === 'all'){
    (state.articles||[]).filter(a=>!a.deleted).forEach(art=>{
      (art.sources||[]).forEach(s=>{
        allItems.push({...s, _kind:'source', _artTitle:art.title, _artId:art.id, tags:s.tags||[]});
      });
    });
  }

  // Tag filter
  const allTags = [...new Set(allItems.flatMap(s=>s.tags||[]))];
  const tagBar = document.getElementById('stockTagBar');
  tagBar.innerHTML = [
    `<button class="stock-tag-btn${!stockTagFilter?' active':''}" onclick="setStockTag(null)" style="font-size:10px">すべて</button>`,
    ...allTags.map(t=>`<button class="stock-tag-btn${stockTagFilter===t?' active':''}" onclick="setStockTag('${esc(t)}')" style="font-size:10px">${esc(t)}</button>`)
  ].join('');

  const filtered = stockTagFilter ? allItems.filter(s=>(s.tags||[]).includes(stockTagFilter)) : allItems;

  updateStockCount();

  const body = document.getElementById('stockBody');
  if(!filtered.length){
    body.innerHTML=`<div class="source-empty">${stockTab==='unused'?'未使用のストックがありません':'引用元がありません'}</div>`;
    return;
  }

  body.innerHTML = filtered.map(item=>{
    const isStock = item._kind==='stock';
    const artLabel = item._artTitle
      ? `<span style="font-size:9px;background:var(--gbg);color:var(--gtx);padding:1px 5px;border-radius:99px">${esc(item._artTitle)}</span>`
      : `<span style="font-size:9px;background:var(--bg2);color:var(--tx3);padding:1px 5px;border-radius:99px;border:0.5px dashed var(--bd2)">未使用</span>`;
    return `<div class="sc" style="margin-bottom:8px">
      <div class="sc-top">
        <div style="flex:1;min-width:0;display:flex;align-items:center;flex-wrap:wrap;gap:3px">
          <span class="stag ${tagClass(item.type||'その他')}">${esc(item.type||'その他')}</span>
          ${artLabel}
          ${item.paraNum?`<span style="font-size:9px;background:var(--gbg);color:var(--gtx);padding:1px 5px;border-radius:99px">段落${item.paraNum}</span>`:''}
          ${(item.tags||[]).map(t=>`<span style="font-size:9px;background:var(--bbg);color:var(--btx);padding:1px 5px;border-radius:99px">${esc(t)}</span>`).join('')}
        </div>
        <button class="sbtn del" onclick="${isStock?`deleteStock('${item.id}')`:`deleteSourceFromStock('${item._artId}','${item.id}')`}"><i class="ti ti-trash" style="font-size:10px"></i></button>
      </div>
      ${item.note?`<div style="font-size:11px;color:var(--tx2);margin-bottom:3px">${esc(item.note)}</div>`:''}
      ${item.quote?`<div class="sc-quote" style="font-size:11px">${esc(item.quote.slice(0,120))}${item.quote.length>120?'…':''}</div>`:''}
      ${item.url?`<div class="sc-url"><a href="${esc(item.url)}" target="_blank">${esc(item.url)}</a></div>`:''}
      <div class="sc-actions">
        ${isStock?`<button class="sbtn" onclick="moveStockToSource('${item.id}')"><i class="ti ti-transfer" style="font-size:10px"></i>案件へ移動</button>`:''}
        ${isStock?`<button class="sbtn" onclick="openEditStock('${item.id}')"><i class="ti ti-edit" style="font-size:10px"></i>編集</button>`:''}
        ${!isStock?`<button class="sbtn" onclick="moveSourceToStock('${item._artId}','${item.id}')"><i class="ti ti-bookmark" style="font-size:10px"></i>ストックへ</button>`:''}
      </div>
    </div>`;
  }).join('');
}

function setStockTag(tag){
  stockTagFilter = tag;
  renderStockPane();
}

function updateStockCount(){
  const stocks = state.stocks || [];
  const countEl = document.getElementById('stockCount');
  const total = stocks.length + (state.articles||[]).filter(a=>!a.deleted).reduce((n,a)=>n+(a.sources||[]).length,0);
  if(countEl) countEl.textContent = total ? total+'件' : '';
}

function moveSourceToStock(artId, sourceId){
  const art = state.articles.find(a=>a.id===artId);
  if(!art) return;
  const s = art.sources.find(x=>x.id===sourceId);
  if(!s) return;
  if(!state.stocks) state.stocks=[];
  state.stocks.unshift({id:uid(),url:s.url||'',quote:s.quote||'',note:s.note||'',tags:[],savedAt:new Date().toLocaleDateString('ja')});
  art.sources = art.sources.filter(x=>x.id!==sourceId);
  save(true);renderSources();renderArtList();renderStockPane();
}

function deleteSourceFromStock(artId, sourceId){
  if(!confirm('削除しますか？')) return;
  const art = state.articles.find(a=>a.id===artId);
  if(!art) return;
  art.sources = art.sources.filter(x=>x.id!==sourceId);
  save(true);renderSources();renderArtList();renderStockPane();
}

let editingStockId = null;

function openAddStockModal(prefill){
  editingStockId = null;
  document.getElementById('sUrl').value = prefill?.url || '';
  document.getElementById('sQuote').value = prefill?.quote || '';
  document.getElementById('sNote').value = prefill?.note || '';
  document.getElementById('sTags').value = (prefill?.tags||[]).join(', ');
  document.getElementById('addStockModal').classList.remove('hidden');
  showTagSuggestions();
}

function openEditStock(id){
  const s = (state.stocks||[]).find(x=>x.id===id);
  if(!s) return;
  editingStockId = id;
  document.getElementById('sUrl').value = s.url||'';
  document.getElementById('sQuote').value = s.quote||'';
  document.getElementById('sNote').value = s.note||'';
  document.getElementById('sTags').value = (s.tags||[]).join(', ');
  document.getElementById('addStockModal').classList.remove('hidden');
}

function showTagSuggestions(){
  const allTags = [...new Set([
    ...(state.stocks||[]).flatMap(s=>s.tags||[]),
    ...(state.articles||[]).flatMap(a=>(a.sources||[]).flatMap(s=>s.tags||[]))
  ])];
  const hint = document.getElementById('existingTagsHint');
  if(!hint||!allTags.length) return;
  hint.innerHTML = '<span style="font-size:10px;color:var(--tx3)">既存タグ: </span>' +
    allTags.map(t=>`<button onclick="addTagToInput('${esc(t)}')" style="font-size:10px;padding:1px 7px;border-radius:99px;border:0.5px solid var(--bd2);background:var(--bg2);cursor:pointer;margin:1px;color:var(--tx2)">${esc(t)}</button>`).join('');
}

function addTagToInput(tag){
  const input = document.getElementById('sTags');
  const current = input.value.trim();
  const tags = current ? current.split(/[,、]/).map(t=>t.trim()).filter(Boolean) : [];
  if(!tags.includes(tag)) tags.push(tag);
  input.value = tags.join(', ');
}

function saveStock(){
  if(!state.stocks) state.stocks=[];
  const url = document.getElementById('sUrl').value.trim();
  const quote = document.getElementById('sQuote').value.trim();
  const note = document.getElementById('sNote').value.trim();
  const tagsRaw = document.getElementById('sTags').value.trim();
  const tags = tagsRaw ? tagsRaw.split(/[,、]/).map(t=>t.trim()).filter(Boolean) : [];
  if(!url&&!quote&&!note){alert('URL、引用テキスト、メモのいずれかを入力してください');return;}
  const item = {id:editingStockId||uid(), url, quote, note, tags, savedAt:new Date().toLocaleDateString('ja')};
  if(editingStockId){
    const idx=state.stocks.findIndex(s=>s.id===editingStockId);
    if(idx>=0) state.stocks[idx]=item;
  } else {
    state.stocks.unshift(item);
  }
  save(true);
  updateStockCount();
  renderStockPanel();
  closeModal('addStockModal');
}

function deleteStock(id){
  if(!confirm('このストックを削除しますか？')) return;
  state.stocks=(state.stocks||[]).filter(s=>s.id!==id);
  save(true);updateStockCount();renderStockPanel();
}

function moveStockToSource(id){
  openMoveToArticlePicker(id, 'stock', '');
}

function openMoveToArticlePicker(itemId, kind, fromArtId){
  const activeArts = (state.articles||[]).filter(a=>!a.deleted);
  if(!activeArts.length){alert('案件がありません。先に案件を作成してください。');return;}
  let existing = document.getElementById('moveToArtModal');
  if(existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'moveToArtModal';
  modal.className = 'modal-bg';
  modal.style.zIndex = '400';
  modal.innerHTML = `
    <div class="modal" style="width:420px">
      <h2><i class="ti ti-transfer"></i> どの案件に移動しますか？</h2>
      <div style="max-height:320px;overflow-y:auto;margin-bottom:14px">
        ${activeArts.map(a=>`
          <div class="ali${a.id===state.currentId?' active':''}" onclick="confirmMoveToArt('${itemId}','${kind}','${fromArtId}','${a.id}')">
            <div>
              <div class="ali-title">${esc(a.title)}</div>
              <div class="ali-meta">${a.createdAt} · 引用${a.sources.length}件</div>
            </div>
            <span class="status-badge status-${a.status||'writing'}">${statusLabel(a.status||'writing')}</span>
          </div>`).join('')}
      </div>
      <div class="modal-footer">
        <button class="mbtn" onclick="document.getElementById('moveToArtModal').remove()">キャンセル</button>
      </div>
    </div>`;
  modal.addEventListener('click', e=>{ if(e.target===modal) modal.remove(); });
  document.body.appendChild(modal);
}

function confirmMoveToArt(itemId, kind, fromArtId, toArtId){
  const toArt = state.articles.find(a=>a.id===toArtId);
  if(!toArt) return;
  document.getElementById('moveToArtModal')?.remove();
  if(kind==='stock'){
    const s = (state.stocks||[]).find(x=>x.id===itemId);
    if(!s) return;
    toArt.sources.push({id:uid(),url:s.url||'',quote:s.quote||'',translation:'',type:s.type||'その他',note:s.note||'',paraNum:null,sourceKind:'web',tags:s.tags||[]});
    state.stocks = (state.stocks||[]).filter(x=>x.id!==itemId);
  } else {
    const fromArt = state.articles.find(a=>a.id===fromArtId);
    if(!fromArt) return;
    const s = fromArt.sources.find(x=>x.id===itemId);
    if(!s) return;
    toArt.sources.push({...s, id:uid(), paraNum:null});
    fromArt.sources = fromArt.sources.filter(x=>x.id!==itemId);
  }
  save(true);renderSources();renderArtList();renderStockPane();updateStockCount();
}

function importPending(){
  const clips = window._pendingClips||[];
  if(!clips.length) return;
  window._pendingClips = null;
  openImportPicker(clips);
}

function openImportPicker(clips){
  let existing = document.getElementById('importPickerModal');
  if(existing) existing.remove();
  const activeArts = (state.articles||[]).filter(a=>!a.deleted);
  const modal = document.createElement('div');
  modal.id = 'importPickerModal';
  modal.className = 'modal-bg';
  modal.style.zIndex = '400';
  const clipsJson = JSON.stringify(clips);
  const preview = clips.slice(0,3).map(c=>`<div style="font-size:11px;padding:4px 8px;background:var(--bg2);border-radius:var(--r);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.quote?'"'+c.quote.slice(0,50)+'…"':c.url)}</div>`).join('');
  const artItems = activeArts.map(a=>`<div class="ali" onclick="importToArticle(window._importClips,'${a.id}')"><div><div class="ali-title">${esc(a.title)}</div><div class="ali-meta">${a.createdAt} · 引用${a.sources.length}件</div></div><span class="status-badge status-${a.status||'writing'}">${statusLabel(a.status||'writing')}</span></div>`).join('');
  modal.innerHTML = `<div class="modal" style="width:440px">
    <h2><i class="ti ti-clipboard-check"></i> ${clips.length}件のクリップをどこに保存しますか？</h2>
    <div style="margin-bottom:12px">${preview}${clips.length>3?`<div style="font-size:10px;color:var(--tx3);padding:2px 8px">他${clips.length-3}件</div>`:''}</div>
    <div style="font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:6px">保存先:</div>
    <div class="ali" onclick="importToStock()" style="border:0.5px solid var(--bd2);margin-bottom:4px">
      <div><div class="ali-title"><i class="ti ti-bookmark" style="color:var(--btx)"></i> ストックに保存</div><div class="ali-meta">後で案件に振り分けられます</div></div>
    </div>
    ${artItems}
    <div class="modal-footer"><button class="mbtn" onclick="document.getElementById('importPickerModal').remove()">キャンセル</button></div>
  </div>`;
  modal.addEventListener('click', e=>{ if(e.target===modal) modal.remove(); });
  window._importClips = clips;
  document.body.appendChild(modal);
}

function importToStock(){
  document.getElementById('importPickerModal')?.remove();
  checkPendingForStock(window._importClips||[]);
  window._importClips = null;
  if(!stockPaneVisible) toggleStockPane();
}

function importToArticle(clips, artId){
  document.getElementById('importPickerModal')?.remove();
  const art = state.articles.find(a=>a.id===artId);
  if(!art) return;
  (clips||[]).forEach(c=>{
    art.sources.push({id:uid(),url:c.url||'',quote:c.quote||'',translation:'',type:c.sourceType||'その他',note:c.title||'',paraNum:null,sourceKind:'web'});
  });
  window._importClips = null;
  save(true);
  if(state.currentId===artId) renderSources();
  renderArtList();
}
