<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記者引用元管理ツール</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#ffffff;--bg-secondary:#f7f7f5;--bg-tertiary:#f0efe9;
  --text-primary:#1a1a1a;--text-secondary:#555;--text-tertiary:#999;
  --border-light:rgba(0,0,0,0.08);--border-mid:rgba(0,0,0,0.14);--border-strong:rgba(0,0,0,0.22);
  --green:#1D9E75;--green-bg:#E1F5EE;--green-text:#085041;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#0C447C;
  --amber-bg:#FAEEDA;--amber-text:#633806;
  --purple-bg:#EEEDFE;--purple-text:#3C3489;
  --radius-md:8px;--radius-lg:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-primary:#1e1e1e;--bg-secondary:#262626;--bg-tertiary:#2e2e2e;
    --text-primary:#e8e8e8;--text-secondary:#aaa;--text-tertiary:#666;
    --border-light:rgba(255,255,255,0.07);--border-mid:rgba(255,255,255,0.12);--border-strong:rgba(255,255,255,0.2);
  }
}
body{font-family:var(--font);background:var(--bg-tertiary);color:var(--text-primary);height:100vh;display:flex;flex-direction:column}
.app{display:flex;flex:1;overflow:hidden;background:var(--bg-primary);margin:12px;border-radius:var(--radius-lg);border:0.5px solid var(--border-light);box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.sidebar{width:230px;border-right:0.5px solid var(--border-light);display:flex;flex-direction:column;background:var(--bg-secondary);flex-shrink:0;border-radius:var(--radius-lg) 0 0 var(--radius-lg)}
.sidebar-header{padding:16px 14px 10px;border-bottom:0.5px solid var(--border-light)}
.sidebar-header h1{font-size:13px;font-weight:500;color:var(--text-secondary);letter-spacing:0.03em}
.article-list{flex:1;overflow-y:auto;padding:8px}
.article-item{padding:8px 10px;border-radius:var(--radius-md);cursor:pointer;margin-bottom:3px;border:0.5px solid transparent;transition:background 0.1s}
.article-item:hover{background:var(--bg-primary);border-color:var(--border-light)}
.article-item.active{background:var(--bg-primary);border-color:var(--border-mid)}
.article-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.article-meta{font-size:11px;color:var(--text-tertiary);margin-top:2px}
.new-btn{margin:8px;padding:8px 10px;border:0.5px dashed var(--border-mid);border-radius:var(--radius-md);background:transparent;cursor:pointer;font-size:13px;color:var(--text-secondary);display:flex;align-items:center;gap:6px;font-family:var(--font)}
.new-btn:hover{background:var(--bg-primary);color:var(--text-primary)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.main-header{padding:14px 18px 10px;border-bottom:0.5px solid var(--border-light);display:flex;align-items:center;gap:10px}
.article-name-input{flex:1;background:transparent;border:none;font-size:15px;font-weight:500;color:var(--text-primary);outline:none;font-family:var(--font)}
.article-name-input::placeholder{color:var(--text-tertiary)}
.tabs{display:flex;border-bottom:0.5px solid var(--border-light);padding:0 18px}
.tab{padding:8px 14px;font-size:13px;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;display:flex;align-items:center;gap:5px}
.tab.active{color:var(--text-primary);border-bottom-color:var(--text-primary);font-weight:500}
.tab-content{flex:1;overflow-y:auto;padding:16px 18px}
.clip-form{background:var(--bg-secondary);border-radius:var(--radius-md);padding:14px;margin-bottom:14px;border:0.5px solid var(--border-light)}
.form-label{font-size:11px;color:var(--text-secondary);margin-bottom:4px;display:block;font-weight:500;text-transform:uppercase;letter-spacing:0.04em}
.form-input{width:100%;padding:7px 10px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);font-size:13px;outline:none;font-family:var(--font);transition:border-color 0.15s}
.form-input:focus{border-color:var(--border-strong)}
textarea.form-input{resize:vertical;min-height:60px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.mb8{margin-bottom:8px}
.add-btn{width:100%;padding:8px;background:var(--bg-primary);border:0.5px solid var(--border-mid);border-radius:var(--radius-md);cursor:pointer;font-size:13px;color:var(--text-primary);display:flex;align-items:center;justify-content:center;gap:6px;font-family:var(--font);margin-top:10px}
.add-btn:hover{background:var(--bg-secondary)}
.add-btn.primary{background:var(--green);color:white;border-color:var(--green)}
.add-btn.primary:hover{opacity:0.88}
.source-card{background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-md);padding:10px 12px;margin-bottom:8px}
.stag{font-size:10px;padding:2px 7px;border-radius:var(--radius-md);font-weight:500;flex-shrink:0;display:inline-block}
.t-sns{background:var(--blue-bg);color:var(--blue-text)}
.t-un{background:var(--green-bg);color:var(--green-text)}
.t-research{background:var(--amber-bg);color:var(--amber-text)}
.t-media{background:var(--purple-bg);color:var(--purple-text)}
.t-other{background:var(--bg-secondary);color:var(--text-secondary)}
.source-quote{font-size:13px;color:var(--text-primary);margin:6px 0;line-height:1.5;font-style:italic;border-left:2px solid var(--border-mid);padding-left:8px}
.source-trans{font-size:12px;color:var(--text-secondary);line-height:1.5;margin:4px 0}
.source-url{font-size:11px;color:var(--text-tertiary);word-break:break-all;margin-top:4px}
.source-url a{color:var(--blue);text-decoration:none}
.source-url a:hover{text-decoration:underline}
.source-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.sbtn{font-size:11px;padding:3px 9px;border:0.5px solid var(--border-light);border-radius:var(--radius-md);background:transparent;cursor:pointer;color:var(--text-secondary);display:flex;align-items:center;gap:3px;font-family:var(--font)}
.sbtn:hover{background:var(--bg-secondary);color:var(--text-primary)}
.sbtn.linked{color:var(--blue);border-color:#B5D4F4;background:var(--blue-bg)}
.para-badge{font-size:10px;background:var(--green-bg);color:var(--green-text);padding:1px 6px;border-radius:var(--radius-md);margin-left:3px}
.del-btn{background:transparent;border:none;cursor:pointer;color:var(--text-tertiary);padding:2px;display:flex;align-items:center;flex-shrink:0}
.del-btn:hover{color:var(--text-primary)}
.empty-state{text-align:center;padding:48px 20px;color:var(--text-tertiary);font-size:13px;line-height:1.8}
.note-area{width:100%;min-height:140px;padding:10px 12px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);font-size:13px;line-height:1.7;font-family:var(--font);outline:none;resize:vertical}
.note-area:focus{border-color:var(--border-strong)}
.verify-card{background:var(--bg-secondary);border-radius:var(--radius-md);padding:12px;margin-bottom:10px;border:0.5px solid var(--border-light)}
.verify-result{font-size:13px;color:var(--text-primary);line-height:1.6;margin-top:10px;padding:10px;background:var(--bg-primary);border-radius:var(--radius-md);border:0.5px solid var(--border-light)}
.status-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:var(--radius-md);font-weight:500}
.s-ok{background:var(--green-bg);color:var(--green-text)}
.s-warn{background:var(--amber-bg);color:var(--amber-text)}
.s-pending{background:var(--bg-tertiary);color:var(--text-secondary)}
.spinner{display:inline-block;width:11px;height:11px;border:2px solid var(--border-mid);border-top-color:var(--text-secondary);border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pending-banner{background:var(--green-bg);border:0.5px solid #9FE1CB;border-radius:var(--radius-md);padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.pending-banner p{font-size:13px;color:var(--green-text)}
.pending-banner button{font-size:12px;padding:4px 12px;background:var(--green);color:white;border:none;border-radius:var(--radius-md);cursor:pointer;font-family:var(--font)}
.link-tip{font-size:12px;color:var(--text-tertiary);margin-top:6px;padding:8px 10px;background:var(--bg-secondary);border-radius:var(--radius-md);line-height:1.6}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header"><h1>案件一覧</h1></div>
    <div class="article-list" id="articleList"></div>
    <button class="new-btn" onclick="newArticle()"><i class="ti ti-plus"></i>新規案件</button>
  </div>
  <div class="main" id="mainPanel">
    <div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-tertiary);font-size:13px">
      左から案件を選ぶか、新規作成してください
    </div>
  </div>
</div>

<script>
const STORAGE_KEY='reporter_v2';
let state={articles:[],currentId:null};
let currentTab='clips';

function load(){
  try{const d=localStorage.getItem(STORAGE_KEY);if(d)state=JSON.parse(d);}catch(e){}
  renderAll();
  // Check for clips pushed from extension
  checkPendingClips();
}

function save(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function checkPendingClips(){
  try{
    const raw=localStorage.getItem('reporter_pending_clips');
    if(!raw)return;
    const clips=JSON.parse(raw);
    if(!clips||!clips.length)return;
    localStorage.removeItem('reporter_pending_clips');
    // Show banner
    window._pendingClips=clips;
    renderAll();
  }catch(e){}
}

function importPendingClips(){
  const art=getCurrentArticle();
  if(!art){alert('まず案件を選択してください');return;}
  const clips=window._pendingClips||[];
  clips.forEach(c=>{
    art.sources.push({
      id:uid(),
      url:c.url||'',
      quote:c.quote||'',
      translation:'',
      type:c.sourceType||'その他',
      note:c.title||'',
      linkedPara:null
    });
  });
  window._pendingClips=null;
  save();
  renderAll();
}

function tagClass(t){
  const m={'SNS/X':'t-sns','国連・公式':'t-un','研究機関':'t-research','メディア':'t-media','その他':'t-other'};
  return m[t]||'t-other';
}

function newArticle(){
  const a={id:uid(),title:'新規案件',createdAt:new Date().toLocaleDateString('ja'),sources:[],note:'',paragraphs:[]};
  state.articles.unshift(a);state.currentId=a.id;
  save();renderAll();
  setTimeout(()=>{const i=document.getElementById('ain');if(i){i.focus();i.select();}},50);
}

function selectArticle(id){state.currentId=id;renderAll();}

function deleteArticle(id,e){
  e.stopPropagation();
  if(!confirm('この案件を削除しますか？'))return;
  state.articles=state.articles.filter(a=>a.id!==id);
  if(state.currentId===id)state.currentId=state.articles[0]?.id||null;
  save();renderAll();
}

function getCurrentArticle(){return state.articles.find(a=>a.id===state.currentId)||null;}

function renderAll(){renderSidebar();renderMain();}

function renderSidebar(){
  const el=document.getElementById('articleList');
  if(!state.articles.length){el.innerHTML='<div style="padding:14px;font-size:12px;color:var(--text-tertiary);text-align:center">案件がありません</div>';return;}
  el.innerHTML=state.articles.map(a=>`
    <div class="article-item${a.id===state.currentId?' active':''}" onclick="selectArticle('${a.id}')">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:4px">
        <div class="article-title">${esc(a.title)}</div>
        <button class="del-btn" onclick="deleteArticle('${a.id}',event)"><i class="ti ti-x" style="font-size:12px"></i></button>
      </div>
      <div class="article-meta">${a.createdAt} · 引用${a.sources.length}件</div>
    </div>`).join('');
}

function renderMain(){
  const mp=document.getElementById('mainPanel');
  const art=getCurrentArticle();
  if(!art){
    mp.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-tertiary);font-size:13px">左から案件を選ぶか、新規作成してください</div>';
    return;
  }
  const pending=window._pendingClips&&window._pendingClips.length;
  mp.innerHTML=`
    <div class="main-header">
      <input class="article-name-input" id="ain" value="${esc(art.title)}" placeholder="案件タイトル" oninput="updateTitle(this.value)">
      <span style="font-size:11px;color:var(--text-tertiary)">${art.createdAt}</span>
    </div>
    <div class="tabs">
      <div class="tab${currentTab==='clips'?' active':''}" onclick="switchTab('clips')">
        <i class="ti ti-link" style="font-size:13px"></i>引用元 (${art.sources.length})
      </div>
      <div class="tab${currentTab==='draft'?' active':''}" onclick="switchTab('draft')">
        <i class="ti ti-file-text" style="font-size:13px"></i>原稿・紐付け
      </div>
      <div class="tab${currentTab==='verify'?' active':''}" onclick="switchTab('verify')">
        <i class="ti ti-check" style="font-size:13px"></i>AI検証
      </div>
    </div>
    <div class="tab-content" id="tabContent"></div>`;
  if(currentTab==='clips')renderClips(art,pending);
  else if(currentTab==='draft')renderDraft(art);
  else renderVerify(art);
}

function switchTab(t){currentTab=t;renderMain();}

function renderClips(art,pending){
  const el=document.getElementById('tabContent');
  const pendingBanner=pending?`
    <div class="pending-banner">
      <p><i class="ti ti-clipboard-check"></i> 拡張機能から <strong>${window._pendingClips.length}件</strong> のクリップが届いています</p>
      <button onclick="importPendingClips()">この案件に取り込む</button>
    </div>`:'';

  el.innerHTML=`${pendingBanner}
    <div class="clip-form">
      <div class="row2">
        <div class="mb8">
          <label class="form-label">引用元URL</label>
          <input class="form-input" id="nUrl" placeholder="https://...">
        </div>
        <div class="mb8">
          <label class="form-label">種別</label>
          <select class="form-input" id="nType">
            <option>SNS/X</option><option>国連・公式</option><option>研究機関</option><option>メディア</option><option>その他</option>
          </select>
        </div>
      </div>
      <div class="mb8">
        <label class="form-label">引用テキスト（原文）</label>
        <textarea class="form-input" id="nQuote" placeholder="ページから引用したい部分をペースト"></textarea>
      </div>
      <div class="mb8">
        <label class="form-label">和訳メモ（任意）</label>
        <textarea class="form-input" id="nTrans" placeholder="自分の訳をメモ（後でAI検証できます）" style="min-height:44px"></textarea>
      </div>
      <div class="mb8">
        <label class="form-label">備考</label>
        <input class="form-input" id="nNote" placeholder="誰の発言か、文脈など">
      </div>
      <button class="add-btn" onclick="addSource()"><i class="ti ti-plus"></i>引用元を追加</button>
    </div>
    ${art.sources.length===0?'<div class="empty-state"><i class="ti ti-clipboard" style="font-size:28px;display:block;margin-bottom:10px"></i>引用元がまだありません</div>':
    art.sources.map(s=>`
      <div class="source-card" id="sc_${s.id}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <div style="flex:1;min-width:0">
            <span class="stag ${tagClass(s.type)}">${esc(s.type)}</span>
            ${s.note?`<span style="font-size:12px;color:var(--text-secondary);margin-left:6px">${esc(s.note)}</span>`:''}
          </div>
          <button class="del-btn" onclick="deleteSource('${s.id}')"><i class="ti ti-trash" style="font-size:13px"></i></button>
        </div>
        ${s.quote?`<div class="source-quote">${esc(s.quote)}</div>`:''}
        ${s.translation?`<div class="source-trans">和訳: ${esc(s.translation)}</div>`:''}
        <div class="source-url"><a href="${esc(s.url)}" target="_blank">${esc(s.url)}</a></div>
        <div class="source-actions">
          <button class="sbtn" onclick="copyQuote('${s.id}')"><i class="ti ti-copy" style="font-size:12px"></i>原文コピー</button>
          <button class="sbtn${s.linkedPara?' linked':''}" onclick="linkPara('${s.id}')">
            <i class="ti ti-link" style="font-size:12px"></i>段落に紐付け${s.linkedPara?`<span class="para-badge">¶${s.linkedPara}</span>`:''}
          </button>
        </div>
      </div>`).join('')}`;
}

function renderDraft(art){
  const el=document.getElementById('tabContent');
  const groups={};
  art.sources.forEach(s=>{if(s.linkedPara){if(!groups[s.linkedPara])groups[s.linkedPara]=[];groups[s.linkedPara].push(s);}});
  el.innerHTML=`
    <div style="margin-bottom:14px">
      <label class="form-label" style="margin-bottom:6px">原稿メモ</label>
      <textarea class="note-area" id="noteArea" placeholder="原稿の各段落をここに記入。引用元タブで段落番号を紐付けると、下に対応関係が表示されます。">${esc(art.note||'')}</textarea>
      <button class="add-btn" style="margin-top:6px" onclick="saveNote()"><i class="ti ti-device-floppy"></i>保存</button>
    </div>
    ${Object.keys(groups).length>0?`
    <div style="border-top:0.5px solid var(--border-light);padding-top:14px">
      <label class="form-label" style="margin-bottom:10px">引用元の紐付け状況</label>
      ${Object.entries(groups).sort((a,b)=>+a[0]-+b[0]).map(([para,srcs])=>`
        <div style="margin-bottom:12px">
          <div style="font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:5px">¶ 段落 ${para}</div>
          ${srcs.map(s=>`
            <div style="background:var(--bg-secondary);border:0.5px solid var(--border-light);border-radius:var(--radius-md);padding:7px 10px;margin-bottom:4px">
              <span class="stag ${tagClass(s.type)}" style="font-size:10px">${esc(s.type)}</span>
              ${s.note?` <span style="font-size:12px;color:var(--text-secondary)">${esc(s.note)}</span>`:''}
              ${s.quote?`<div style="font-style:italic;color:var(--text-secondary);margin-top:3px;font-size:11px">"${esc(s.quote.substring(0,90))}${s.quote.length>90?'...':''}"</div>`:''}
              <div style="color:var(--text-tertiary);font-size:11px;margin-top:2px">${esc(s.url.substring(0,70))}${s.url.length>70?'...':''}</div>
            </div>`).join('')}
        </div>`).join('')}
    </div>`:'<div class="empty-state" style="padding:24px"><i class="ti ti-link-off" style="font-size:22px;display:block;margin-bottom:8px"></i>まだ段落に紐付けた引用元がありません</div>'}`;
}

function renderVerify(art){
  const el=document.getElementById('tabContent');
  const withTrans=art.sources.filter(s=>s.quote&&s.translation);
  el.innerHTML=`
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:14px;line-height:1.6">
      原文と和訳が両方入力されている引用元を、AIが一括検証します。<br>英語・ヘブライ語・アラビア語など多言語に対応。
    </div>
    ${withTrans.length===0?
    `<div class="empty-state"><i class="ti ti-language" style="font-size:28px;display:block;margin-bottom:10px"></i>検証できる引用元がありません<br><span style="font-size:12px">「引用元」タブで原文と和訳を入力してください</span></div>`:
    `<button class="add-btn primary" style="margin-bottom:16px" onclick="verifyAll()"><i class="ti ti-robot"></i>すべて検証する (${withTrans.length}件)</button>
    <div id="verifyResults">
    ${withTrans.map(s=>`
      <div class="verify-card" id="vc_${s.id}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
          <div style="display:flex;align-items:center;gap:6px">
            <span class="stag ${tagClass(s.type)}">${esc(s.type)}</span>
            ${s.note?`<span style="font-size:12px;color:var(--text-secondary)">${esc(s.note)}</span>`:''}
          </div>
          <span class="status-badge s-pending" id="vs_${s.id}">未検証</span>
        </div>
        <div style="font-size:12px;color:var(--text-secondary);font-style:italic;margin-bottom:4px">"${esc(s.quote.substring(0,100))}${s.quote.length>100?'...':''}"</div>
        <div style="font-size:12px">和訳: ${esc(s.translation)}</div>
        <div id="vr_${s.id}"></div>
      </div>`).join('')}
    </div>`}`;
}

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function updateTitle(v){const a=getCurrentArticle();if(a){a.title=v;renderSidebar();save();}}

function addSource(){
  const art=getCurrentArticle();if(!art)return;
  const url=document.getElementById('nUrl').value.trim();
  const quote=document.getElementById('nQuote').value.trim();
  if(!url&&!quote){alert('URLか引用テキストを入力してください');return;}
  art.sources.push({id:uid(),url,quote,translation:document.getElementById('nTrans').value.trim(),type:document.getElementById('nType').value,note:document.getElementById('nNote').value.trim(),linkedPara:null});
  save();renderMain();
}

function deleteSource(id){
  const art=getCurrentArticle();if(!art)return;
  if(!confirm('この引用元を削除しますか？'))return;
  art.sources=art.sources.filter(s=>s.id!==id);save();renderMain();
}

function copyQuote(id){
  const art=getCurrentArticle();if(!art)return;
  const s=art.sources.find(x=>x.id===id);if(!s)return;
  navigator.clipboard.writeText(s.quote||s.url).catch(()=>{});
  const btn=document.querySelector(`#sc_${s.id} .sbtn`);
  if(btn){const o=btn.innerHTML;btn.innerHTML='<i class="ti ti-check" style="font-size:12px"></i>コピー完了';setTimeout(()=>btn.innerHTML=o,1500);}
}

function linkPara(id){
  const art=getCurrentArticle();if(!art)return;
  const s=art.sources.find(x=>x.id===id);if(!s)return;
  const v=prompt('紐付ける段落番号を入力（例: 1）\n空欄で解除:',s.linkedPara||'');
  if(v===null)return;
  s.linkedPara=v.trim()||null;save();renderMain();
}

function saveNote(){
  const art=getCurrentArticle();if(!art)return;
  art.note=document.getElementById('noteArea')?.value||'';save();
  const btn=document.querySelector('#tabContent .add-btn');
  if(btn){const o=btn.innerHTML;btn.innerHTML='<i class="ti ti-check"></i>保存しました';setTimeout(()=>btn.innerHTML=o,1500);}
}

async function verifyAll(){
  const art=getCurrentArticle();if(!art)return;
  const sources=art.sources.filter(s=>s.quote&&s.translation);
  for(const s of sources){
    const se=document.getElementById(`vs_${s.id}`);
    const re=document.getElementById(`vr_${s.id}`);
    if(se)se.innerHTML='<span class="spinner"></span> 検証中';
    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          messages:[{role:'user',content:`あなたは海外特派員の原稿における引用翻訳チェッカーです。以下の原文と和訳を比較し、JSON形式のみで返答してください。

原文: ${s.quote}
和訳: ${s.translation}

{"status":"ok" or "warn","issues":"問題点（okなら空）","suggestion":"修正案（okなら空）","accuracy":"精度の一言評価"}`}]
        })
      });
      const data=await resp.json();
      const text=(data.content||[]).map(i=>i.text||'').join('');
      let parsed;
      try{parsed=JSON.parse(text.replace(/```json|```/g,'').trim());}
      catch(e){parsed={status:'warn',issues:'解析エラー',suggestion:'',accuracy:''};}
      if(se){se.className=`status-badge ${parsed.status==='ok'?'s-ok':'s-warn'}`;se.textContent=parsed.status==='ok'?'問題なし':'要確認';}
      if(re){re.innerHTML=`<div class="verify-result">
        <div style="font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:4px">精度</div>
        <div style="font-size:13px;margin-bottom:${parsed.issues?'10px':'0'}">${esc(parsed.accuracy)}</div>
        ${parsed.issues?`<div style="font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:4px">指摘</div><div style="font-size:13px;margin-bottom:${parsed.suggestion?'10px':'0'}">${esc(parsed.issues)}</div>`:''}
        ${parsed.suggestion?`<div style="font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:4px">修正案</div><div style="font-size:13px">${esc(parsed.suggestion)}</div>`:''}
      </div>`;}
    }catch(err){
      if(se){se.className='status-badge s-warn';se.textContent='エラー';}
    }
  }
}

// Listen for clips pushed by extension via localStorage events
window.addEventListener('storage',e=>{
  if(e.key==='reporter_pending_clips'&&e.newValue){
    try{
      window._pendingClips=JSON.parse(e.newValue);
      localStorage.removeItem('reporter_pending_clips');
      renderAll();
    }catch(err){}
  }
});

load();
</script>
